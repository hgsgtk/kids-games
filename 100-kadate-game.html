<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 100かいだてのいえ 🏠</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.min.js"></script>
    <script src="assets/i18n.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'M PLUS Rounded 1c','Comic Sans MS',cursive,sans-serif;overflow:hidden;height:100vh;background:#1a1a2e}

        #skyCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}

        /* ===== Start Screen ===== */
        .start-screen{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:linear-gradient(180deg,#87CEEB 0%,#E0F7FA 35%,#A5D6A7 65%,#4CAF50 100%);overflow-y:auto;padding:20px}
        .start-screen.hidden{display:none}
        .start-title{font-size:clamp(1.8rem,5vw,3.2rem);color:#5D4037;text-shadow:3px 3px 6px rgba(0,0,0,.15);animation:titleBounce 3s ease-in-out infinite;text-align:center;line-height:1.4}
        @keyframes titleBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        .start-building{font-size:clamp(4rem,12vw,7rem);animation:buildFloat 4s ease-in-out infinite;filter:drop-shadow(0 8px 16px rgba(0,0,0,.2))}
        @keyframes buildFloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-12px) rotate(2deg)}}
        .mode-box{background:rgba(255,255,255,.92);padding:24px 28px;border-radius:28px;box-shadow:0 12px 40px rgba(0,0,0,.18);border:3px solid #fff;text-align:center;max-width:95vw;width:560px}
        .mode-box h3{font-size:1.3rem;color:#5D4037;margin-bottom:12px}
        .var-buttons{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
        .var-btn{padding:14px 10px;font-size:1rem;font-weight:bold;background:linear-gradient(135deg,#8D6E63,#5D4037);color:#fff;border:3px solid transparent;border-radius:16px;cursor:pointer;transition:all .25s;box-shadow:0 4px 14px rgba(0,0,0,.15);font-family:inherit;line-height:1.35;text-align:center}
        .var-btn:hover{transform:translateY(-3px) scale(1.04)}
        .var-btn.selected{border-color:#FFD700;box-shadow:0 0 20px rgba(255,193,7,.5);transform:scale(1.05)}
        .start-btn{padding:16px 50px;font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,#66BB6A,#43A047);color:#fff;border:3px solid #fff;border-radius:40px;cursor:pointer;transition:all .25s;box-shadow:0 8px 30px rgba(76,175,80,.4);font-family:inherit}
        .start-btn:hover{transform:translateY(-4px) scale(1.06)}
        .start-desc{font-size:.9rem;color:#5D4037;opacity:.8;text-align:center}

        /* ===== Game Layout ===== */
        .game-wrap{position:relative;width:100%;height:100vh;z-index:1;display:none}
        .game-wrap.active{display:flex;flex-direction:column}

        .game-header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:center;gap:10px;padding:7px 14px;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);box-shadow:0 4px 20px rgba(0,0,0,.15);flex-wrap:wrap}
        .game-header h1{font-size:clamp(.85rem,2.3vw,1.2rem);color:#5D4037}
        .stat{background:linear-gradient(135deg,#8D6E63,#5D4037);padding:5px 12px;border-radius:12px;color:#fff;font-size:clamp(.7rem,1.8vw,.9rem);font-weight:bold;box-shadow:0 3px 10px rgba(0,0,0,.15);white-space:nowrap}
        .stat.highlight{background:linear-gradient(135deg,#FF8F00,#F57F17);animation:statPulse 1.5s ease-in-out infinite}
        @keyframes statPulse{0%,100%{box-shadow:0 3px 10px rgba(255,143,0,.3)}50%{box-shadow:0 3px 20px rgba(255,143,0,.6)}}

        .progress-wrap{position:fixed;right:10px;top:56px;bottom:56px;width:30px;z-index:50;display:flex;flex-direction:column;align-items:center}
        .progress-track{flex:1;width:14px;background:rgba(0,0,0,.2);border-radius:7px;position:relative;overflow:hidden;border:2px solid rgba(255,255,255,.3)}
        .progress-fill{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,#66BB6A,#FFD54F,#EF5350);border-radius:5px;transition:height .5s ease}
        .progress-label{font-size:.65rem;color:#fff;font-weight:bold;text-shadow:0 1px 3px rgba(0,0,0,.5);margin-top:3px;text-align:center}
        .progress-char{font-size:1.3rem;position:absolute;left:50%;transform:translateX(-50%);transition:bottom .5s ease;z-index:2;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}

        .building-viewport{position:fixed;top:52px;left:50%;transform:translateX(-50%);width:min(540px,90vw);bottom:54px;overflow:hidden;border-radius:8px}
        .building-scroll{position:relative;transition:transform .6s cubic-bezier(.4,0,.2,1)}

        .building-outer{position:relative;margin:0 auto;width:100%}
        .building-wall-l,.building-wall-r{position:absolute;top:0;bottom:0;width:16px;z-index:10;pointer-events:none}
        .building-wall-l{left:0;border-radius:4px 0 0 4px}
        .building-wall-r{right:0;border-radius:0 4px 4px 0}

        .roof{width:100%;text-align:center;padding:18px 0 6px;position:relative}
        .roof-shape{width:0;height:0;border-left:calc(min(270px,45vw)) solid transparent;border-right:calc(min(270px,45vw)) solid transparent;border-bottom:70px solid #B71C1C;margin:0 auto;position:relative;filter:drop-shadow(0 -4px 8px rgba(0,0,0,.3))}
        .roof-shape::after{content:'⭐';position:absolute;top:-30px;left:50%;transform:translateX(-50%);font-size:1.8rem}

        .foundation{width:100%;height:36px;border-radius:0 0 8px 8px;display:flex;align-items:center;justify-content:center;color:#A1887F;font-weight:bold;font-size:.8rem;letter-spacing:1px}

        /* ===== Floor / Room — BIGGER ===== */
        .floor-row{display:flex;height:110px;position:relative;border-bottom:3px solid rgba(0,0,0,.25);overflow:hidden;transition:all .3s}
        .floor-row:last-child{border-bottom:none}
        .floor-row.current{z-index:5}
        .floor-row.cleared{opacity:.55}
        .floor-row.current .room{box-shadow:inset 0 0 40px rgba(255,215,0,.3)}

        /* Floor number badge — WIDER */
        .floor-num{width:72px;min-width:72px;display:flex;align-items:center;justify-content:center;font-size:clamp(1rem,2.5vw,1.3rem);font-weight:900;color:#fff;position:relative;z-index:2;text-shadow:1px 1px 3px rgba(0,0,0,.5)}
        .floor-num span{background:rgba(0,0,0,.35);padding:5px 6px;border-radius:12px;min-width:52px;text-align:center;display:block}

        .room{flex:1;position:relative;display:flex;align-items:center;padding:0 10px;overflow:hidden;gap:8px}

        /* Room emoji — MUCH BIGGER */
        .room-animal{font-size:clamp(2.5rem,7vw,3.5rem);position:relative;z-index:2;filter:drop-shadow(0 3px 5px rgba(0,0,0,.25));flex-shrink:0;line-height:1}
        .room-items{display:flex;gap:6px;font-size:clamp(1.5rem,4vw,2.2rem);position:relative;z-index:2;flex-wrap:wrap;opacity:.75;line-height:1}
        .room-window{width:34px;height:48px;background:linear-gradient(180deg,#87CEEB,#B3E5FC);border:3px solid rgba(0,0,0,.3);border-radius:6px 6px 0 0;margin-left:auto;flex-shrink:0;position:relative;z-index:2;box-shadow:inset 0 0 8px rgba(255,255,255,.4)}

        .player{position:absolute;font-size:2.8rem;z-index:20;filter:drop-shadow(0 3px 6px rgba(0,0,0,.4));transition:all .5s cubic-bezier(.4,0,.2,1);left:72px}
        .player.climbing{animation:climbBob .3s ease-in-out 2}
        @keyframes climbBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

        .zone-banner{height:46px;display:flex;align-items:center;justify-content:center;font-size:clamp(.95rem,2.5vw,1.15rem);font-weight:900;color:#fff;text-shadow:1px 1px 3px rgba(0,0,0,.4);letter-spacing:1px;border:none;position:relative;overflow:hidden}
        .zone-banner::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(255,255,255,.06) 10px,rgba(255,255,255,.06) 20px)}

        .input-display{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:rgba(255,255,255,.96);padding:24px 50px;border-radius:28px;box-shadow:0 12px 50px rgba(0,0,0,.35);font-size:clamp(3.5rem,10vw,6rem);font-weight:900;color:#5D4037;z-index:500;border:4px solid #fff;text-align:center;min-width:2.2em;pointer-events:none;opacity:0}
        .input-display.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
        .input-display.correct{color:#2E7D32;border-color:#66BB6A;background:linear-gradient(135deg,#E8F5E9,#C8E6C9);box-shadow:0 12px 50px rgba(76,175,80,.5)}
        .input-display.wrong{color:#C62828;border-color:#EF5350;background:linear-gradient(135deg,#FFEBEE,#FFCDD2);animation:wrongShake .4s}
        @keyframes wrongShake{0%,100%{transform:translate(-50%,-50%) rotate(0)}20%,60%{transform:translate(-48%,-50%) rotate(-3deg)}40%,80%{transform:translate(-52%,-50%) rotate(3deg)}}

        .controls{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;gap:10px;padding:10px 16px;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);box-shadow:0 -4px 20px rgba(0,0,0,.1);justify-content:center;align-items:center}
        .ctrl-btn{padding:8px 20px;font-size:.9rem;font-weight:bold;border:none;border-radius:14px;cursor:pointer;font-family:inherit;transition:all .2s;color:#fff}
        .ctrl-btn.home{background:linear-gradient(135deg,#8D6E63,#5D4037)}
        .ctrl-btn.reset{background:linear-gradient(135deg,#EF5350,#C62828)}
        .ctrl-btn:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.2)}
        .hint-bar{font-size:clamp(.7rem,1.8vw,.85rem);color:#5D4037;font-weight:bold;text-align:center}

        /* Celebration — auto-close */
        .celebration{position:fixed;inset:0;z-index:800;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.45);backdrop-filter:blur(3px)}
        .celebration.show{display:flex}
        .celeb-card{background:#fff;padding:36px 44px;border-radius:30px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);max-width:90vw;animation:celebPop .5s cubic-bezier(.68,-.55,.265,1.55)}
        @keyframes celebPop{0%{transform:scale(.3) rotate(-10deg)}100%{transform:scale(1) rotate(0)}}
        .celeb-card h2{font-size:clamp(1.4rem,4vw,2.2rem);color:#5D4037;margin-bottom:8px}
        .celeb-card .big-emoji{font-size:clamp(3rem,8vw,5rem);margin:10px 0}
        .celeb-card p{font-size:1.1rem;color:#795548;margin:5px 0}
        .celeb-countdown{font-size:.85rem;color:#BDBDBD;margin-top:10px}
        .celeb-card button{margin-top:12px;padding:12px 32px;font-size:1.1rem;font-weight:bold;background:linear-gradient(135deg,#66BB6A,#43A047);color:#fff;border:3px solid #fff;border-radius:20px;cursor:pointer;font-family:inherit;transition:all .2s}
        .celeb-card button:hover{transform:scale(1.06)}

        .particle{position:fixed;pointer-events:none;z-index:600;border-radius:50%}
        .confetti{position:fixed;pointer-events:none;z-index:600;width:10px;height:14px;border-radius:2px}

        .game-over{position:fixed;inset:0;z-index:900;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(6px)}
        .game-over.show{display:flex}
        .go-card{background:linear-gradient(135deg,#FFF8E1,#FFFFFF);padding:40px;border-radius:30px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);max-width:90vw;animation:celebPop .6s cubic-bezier(.68,-.55,.265,1.55)}
        .go-card h2{font-size:clamp(1.8rem,5vw,3rem);color:#F57F17;margin-bottom:10px}
        .go-card .big-emoji{font-size:clamp(4rem,10vw,6rem);margin:10px 0}
        .go-card p{font-size:1.1rem;color:#5D4037;margin:6px 0}
        .go-card .btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px}
        .go-card button{padding:14px 32px;font-size:1.1rem;font-weight:bold;border:3px solid #fff;border-radius:20px;cursor:pointer;font-family:inherit;color:#fff;transition:all .2s}
        .go-card button:hover{transform:scale(1.06)}
        .go-card .btn-home{background:linear-gradient(135deg,#8D6E63,#5D4037)}
        .go-card .btn-retry{background:linear-gradient(135deg,#66BB6A,#43A047)}

        @media(max-width:600px){
            .game-header{padding:5px 6px;gap:5px}
            .game-header h1{font-size:.8rem}
            .stat{padding:3px 7px;font-size:.65rem}
            .floor-row{height:95px}
            .floor-num{width:58px;min-width:58px}
            .floor-num span{font-size:.9rem;padding:4px 4px;min-width:42px}
            .room-animal{font-size:2.2rem}
            .room-items{font-size:1.3rem}
            .building-wall-l,.building-wall-r{width:10px}
            .progress-wrap{width:22px;right:3px}
            .controls{padding:6px 8px;gap:5px}
            .ctrl-btn{padding:6px 12px;font-size:.8rem}
            .player{left:58px;font-size:2.2rem}
        }
    </style>
</head>
<body>
    <canvas id="skyCanvas"></canvas>

    <!-- ===== Start Screen ===== -->
    <div class="start-screen" id="startScreen">
        <div class="start-building">🏠</div>
        <div class="start-title">🏠 100かいだてのいえ 🏠</div>
        <div class="mode-box">
            <h3>📚 どのおうちに のぼる？</h3>
            <div class="var-buttons" id="varButtons">
                <button class="var-btn selected" data-var="original" style="background:linear-gradient(135deg,#8D6E63,#5D4037)">🏠<br>100かいだてのいえ</button>
                <button class="var-btn" data-var="underground" style="background:linear-gradient(135deg,#6D4C41,#3E2723)">🕳️<br>ちか100かいだてのいえ</button>
                <button class="var-btn" data-var="sea" style="background:linear-gradient(135deg,#0288D1,#01579B)">🌊<br>うみの100かいだてのいえ</button>
                <button class="var-btn" data-var="sky" style="background:linear-gradient(135deg,#42A5F5,#1565C0)">☁️<br>そらの100かいだてのいえ</button>
                <button class="var-btn" data-var="forest" style="background:linear-gradient(135deg,#66BB6A,#2E7D32)">🌲<br>もりの100かいだてのいえ</button>
            </div>
        </div>
        <button class="start-btn" id="startBtn">🚀 のぼりはじめよう！</button>
        <div class="start-desc">⌨️ キーボードで数字を入力して 100かいまで のぼろう！</div>
    </div>

    <!-- ===== Game Screen ===== -->
    <div class="game-wrap" id="gameWrap">
        <div class="game-header">
            <h1 id="gameTitle">🏠 100かいだてのいえ</h1>
            <div class="stat highlight" id="statNext">つぎ: <strong>1</strong>かい</div>
            <div class="stat" id="statFloor">いま: <strong>0</strong>かい</div>
            <div class="stat" id="statZone">🐭 ねずみ</div>
        </div>

        <div class="progress-wrap">
            <div class="progress-track">
                <div class="progress-fill" id="progFill" style="height:0%"></div>
                <div class="progress-char" id="progChar" style="bottom:0%">🧒</div>
            </div>
            <div class="progress-label" id="progLabel">0%</div>
        </div>

        <div class="building-viewport" id="viewport">
            <div class="building-scroll" id="buildingScroll">
                <div class="building-outer" id="buildingOuter">
                    <div class="building-wall-l" id="wallL"></div>
                    <div class="building-wall-r" id="wallR"></div>
                    <div class="roof" id="roofEl"><div class="roof-shape" id="roofShape"></div></div>
                    <div id="floorsContainer"></div>
                    <div class="foundation" id="foundation">🏠 100かいだてのいえ</div>
                </div>
                <div class="player" id="player">🧒</div>
            </div>
        </div>

        <div class="controls">
            <button class="ctrl-btn home" id="btnHome">🏠 メニュー</button>
            <div class="hint-bar" id="hintBar">⌨️ キーボードで数字を入力してね！</div>
            <button class="ctrl-btn reset" id="btnReset">🔄 リセット</button>
        </div>
    </div>

    <div class="input-display" id="inputDisplay"></div>

    <div class="celebration" id="celebration">
        <div class="celeb-card" id="celebCard">
            <h2 id="celebTitle">🎉 ゾーンクリア！</h2>
            <div class="big-emoji" id="celebEmoji">🐭</div>
            <p id="celebDesc">ねずみゾーン クリア！</p>
            <div class="celeb-countdown" id="celebCountdown"></div>
            <button id="celebBtn" onclick="closeCelebration()">つぎへ すすもう！ →</button>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <div class="go-card">
            <h2 id="goTitle">🎉 おめでとう！ 🎉</h2>
            <div class="big-emoji" id="goEmoji">🏠</div>
            <p id="goDesc">100かいだてに とうちゃく！</p>
            <p id="goStats"></p>
            <div class="btn-row">
                <button class="btn-home" onclick="backToMenu()">🏠 メニューへ</button>
                <button class="btn-retry" onclick="retryGame()">🔄 もういちど</button>
            </div>
        </div>
    </div>

<script>
// ═══════════════════════════════════════════════
//  VARIATION DEFINITIONS (5 books × 10 zones)
// ═══════════════════════════════════════════════
const VARIATIONS = {
    original: {
        title:'🏠 100かいだてのいえ', icon:'🏠',
        wallColor:['#5D4037','#795548'], roofColor:'#B71C1C', foundColor:'#3E2723',
        skyType:'land',
        zones:[
            {name:'ねずみ',animal:'🐭',bg:['#D7CCC8','#BCAAA4'],wall:'#8D6E63',accent:'#5D4037',items:['🧀','🕯️','🪑','🛏️','🍞','🧹','📖','🎂','🧶','🪞','🍪','🎀']},
            {name:'りす',animal:'🐿️',bg:['#FFE0B2','#FFCC80'],wall:'#F57C00',accent:'#E65100',items:['🌰','🍂','🪵','🧶','🍎','🎪','📦','🏺','🌻','🥜','🍄','🧺']},
            {name:'かえる',animal:'🐸',bg:['#C8E6C9','#A5D6A7'],wall:'#388E3C',accent:'#1B5E20',items:['🌿','🍃','🪷','💧','🫧','🐟','🪴','🎣','☂️','🌊','🐌','🦋']},
            {name:'はち',animal:'🐝',bg:['#FFF9C4','#FFF176'],wall:'#F9A825',accent:'#F57F17',items:['🍯','🌻','🌼','🏵️','🌺','🌸','🧁','🎪','🪻','🌾','🦋','☀️']},
            {name:'へび',animal:'🐍',bg:['#E1BEE7','#CE93D8'],wall:'#7B1FA2',accent:'#4A148C',items:['💎','🔮','🕯️','✨','🌙','🗝️','📿','🎭','💜','🦎','🪨','🌌']},
            {name:'ことり',animal:'🐦',bg:['#B3E5FC','#81D4FA'],wall:'#0288D1',accent:'#01579B',items:['☁️','🌤️','🪶','🎵','🎶','🪺','🌈','🎐','🎏','🍃','🌬️','🪁']},
            {name:'きつね',animal:'🦊',bg:['#FFCCBC','#FF8A65'],wall:'#E64A19',accent:'#BF360C',items:['🍁','🏮','🎋','🌙','🍡','🎎','🍵','📕','🧧','🪭','🎑','🍂']},
            {name:'くま',animal:'🐻',bg:['#D7CCC8','#A1887F'],wall:'#4E342E',accent:'#3E2723',items:['🍎','🌲','🏕️','🐟','🪵','🫙','🍖','🛖','🪓','🧸','🌿','🍄']},
            {name:'こうもり',animal:'🦇',bg:['#C5CAE9','#9FA8DA'],wall:'#283593',accent:'#1A237E',items:['🌙','⭐','🕯️','🦉','🌌','🔭','🪄','📘','🕸️','💫','🌠','🏰']},
            {name:'ほしのこ',animal:'⭐',bg:['#FFF9C4','#FFE082'],wall:'#FF8F00',accent:'#E65100',items:['⭐','🌟','💫','🎆','🎇','🌈','👑','🎊','🎉','✨','💖','🌠']},
        ]
    },
    underground: {
        title:'🕳️ ちか100かいだてのいえ', icon:'🕳️',
        wallColor:['#4E342E','#3E2723'], roofColor:'#5D4037', foundColor:'#BF360C',
        skyType:'underground',
        zones:[

let audioReady = false;
const synth = new Tone.PolySynth(Tone.Synth,{oscillator:{type:'triangle8'},envelope:{attack:.01,decay:.3,sustain:.05,release:.5},volume:-10}).toDestination();
const bellSynth = new Tone.PolySynth(Tone.Synth,{oscillator:{type:'sine'},envelope:{attack:.005,decay:.5,sustain:0,release:.8},volume:-14}).toDestination();
const rev = new Tone.Reverb({decay:2.5,wet:.2}).toDestination();
synth.connect(rev); bellSynth.connect(rev);

const scaleNotes = ['C4','D4','E4','F4','G4','A4','B4','C5','D5','E5','F5','G5'];
async function ensureAudio(){if(!audioReady){await Tone.start();audioReady=true}}
function playClimb(f){if(!audioReady)return;synth.triggerAttackRelease(scaleNotes[(f-1)%scaleNotes.length],'16n',Tone.now(),.3)}
function playWrong(){if(!audioReady)return;synth.triggerAttackRelease(['Eb3','A3'],'8n',Tone.now(),.15)}
function playZoneClear(){if(!audioReady)return;['C5','E5','G5','C6'].forEach((n,i)=>bellSynth.triggerAttackRelease(n,'8n',Tone.now()+i*.12,.25))}
function playGameClear(){if(!audioReady)return;['C5','E5','G5','C6','E6','G6','C7'].forEach((n,i)=>bellSynth.triggerAttackRelease(n,'8n',Tone.now()+i*.1,.3))}

// ═══════════════════════════════════════════
const skyCanvas=$('skyCanvas'), skyCtx=skyCanvas.getContext('2d');
let skyW,skyH;
function resizeSky(){skyW=skyCanvas.width=innerWidth;skyH=skyCanvas.height=innerHeight;drawSky()}

function drawSky(){
    const p=currentFloor/MAX_FLOOR;
    const g=skyCtx.createLinearGradient(0,0,0,skyH);
    const st=activeVar().skyType;

    if(st==='land'){
        if(p<.3){g.addColorStop(0,'#4FC3F7');g.addColorStop(.5,'#81D4FA');g.addColorStop(1,'#E1F5FE')}
        else if(p<.6){const t=(p-.3)/.3;g.addColorStop(0,lerp('#4FC3F7','#FF7043',t));g.addColorStop(.5,lerp('#81D4FA','#FFAB91',t));g.addColorStop(1,lerp('#E1F5FE','#FFF3E0',t))}
        else{const t=(p-.6)/.4;g.addColorStop(0,lerp('#FF7043','#1A237E',t));g.addColorStop(.4,lerp('#FFAB91','#283593',t));g.addColorStop(1,lerp('#FFF3E0','#5C6BC0',t))}
    } else if(st==='underground'){
        g.addColorStop(0,lerp('#8D6E63','#3E2723',p));g.addColorStop(.5,lerp('#6D4C41','#1B0000',p));g.addColorStop(1,lerp('#5D4037','#BF360C',p))
    } else if(st==='sea'){
        g.addColorStop(0,lerp('#4FC3F7','#01579B',p));g.addColorStop(.5,lerp('#81D4FA','#0D47A1',p));g.addColorStop(1,lerp('#B3E5FC','#1A237E',p))
    } else if(st==='sky'){
        if(p<.5){g.addColorStop(0,lerp('#81D4FA','#FF7043',p*2));g.addColorStop(1,lerp('#E1F5FE','#FFE0B2',p*2))}
        else{const t=(p-.5)*2;g.addColorStop(0,lerp('#FF7043','#0D47A1',t));g.addColorStop(1,lerp('#FFE0B2','#1A237E',t))}
    } else if(st==='forest'){
        g.addColorStop(0,lerp('#81C784','#1B5E20',p*.5));g.addColorStop(.5,lerp('#A5D6A7','#33691E',p*.5));g.addColorStop(1,lerp('#E8F5E9','#1B5E20',p*.3))
    }
    skyCtx.fillStyle=g;skyCtx.fillRect(0,0,skyW,skyH);

    // Stars when dark
    if((st==='land'&&p>.5)||(st==='sky'&&p>.6)||st==='underground'){
        const a=st==='underground'?(.1+p*.15):Math.min(1,(p-.5)*2.5);
        skyCtx.fillStyle=`rgba(255,255,255,${a})`;
        for(let i=0;i<80;i++){
            const sx=(Math.sin(i*127.1+311.7)*.5+.5)*skyW;
            const sy=(Math.sin(i*269.5+183.3)*.5+.5)*skyH*.6;
            const r=(Math.sin(i*43.3)*.5+.5)*2+.5;
            skyCtx.beginPath();skyCtx.arc(sx,sy,r,0,Math.PI*2);skyCtx.fill();
        }
    }

    // Ground (not for sea/sky)
    if(st==='land'||st==='forest'){
        const gh=50;
        skyCtx.fillStyle=st==='forest'?'#2E7D32':'#4CAF50';
        skyCtx.fillRect(0,skyH-gh,skyW,gh);
        skyCtx.fillStyle=st==='forest'?'#1B5E20':'#388E3C';
        skyCtx.fillRect(0,skyH-gh,skyW,3);
        for(let i=0;i<8;i++){
            const tx=(i+.5)/8*skyW,th=25+Math.sin(i*2.3)*12;
            skyCtx.fillStyle='#2E7D32';
            skyCtx.beginPath();skyCtx.moveTo(tx,skyH-gh);skyCtx.lineTo(tx-12,skyH-gh);skyCtx.lineTo(tx,skyH-gh-th);skyCtx.lineTo(tx+12,skyH-gh);skyCtx.fill();
        }
    }
    if(st==='sea'){
        // Wavy bottom
        skyCtx.fillStyle='#0D47A1';
        skyCtx.fillRect(0,skyH-30,skyW,30);
    }
}

function lerp(c1,c2,t){
    const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
    const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
    return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
}

//  BUILD TOWER
// ═══════════════════════════════════════════
function getZone(f){return activeZones()[Math.min(Math.floor((f-1)/10),9)]}
function randItems(z,n){const a=[];for(let i=0;i<n;i++)a.push(z.items[Math.floor(Math.random()*z.items.length)]);return a}

function buildTower(){
    const c=$('floorsContainer');c.innerHTML='';floorElements=[];
    const v=activeVar();

    // Apply wall / roof colors
    $('wallL').style.background=`linear-gradient(90deg,${v.wallColor[0]},${v.wallColor[1]})`;
    $('wallR').style.background=`linear-gradient(90deg,${v.wallColor[1]},${v.wallColor[0]})`;
    $('roofShape').style.borderBottomColor=v.roofColor;
    $('foundation').style.background=`linear-gradient(to top,${v.foundColor},${v.wallColor[0]})`;
    $('foundation').textContent=v.title;
    $('roofEl').style.display='block';

    for(let zi=9;zi>=0;zi--){
        const z=activeZones()[zi];
        const zs=zi*10+1, ze=(zi+1)*10;

        // Zone banner
        const ban=document.createElement('div');
        ban.className='zone-banner';
        ban.style.background=`linear-gradient(135deg,${z.wall},${z.accent})`;
        ban.textContent=`${z.animal} ${z.name}さんのおうち (${zs}〜${ze}かい) ${z.animal}`;
        c.appendChild(ban);

        for(let f=ze;f>=zs;f--){
            const row=document.createElement('div');
            row.className='floor-row';
            row.dataset.floor=f;
            row.id=`floor-${f}`;
            row.style.background=`linear-gradient(135deg,${z.bg[0]},${z.bg[1]})`;

            const hr=f/100;
            let wc;
            if(v.skyType==='sea') wc='linear-gradient(180deg,#4FC3F7,#0288D1)';
            else if(v.skyType==='underground') wc='linear-gradient(180deg,#6D4C41,#3E2723)';
            else if(hr<.4) wc='linear-gradient(180deg,#87CEEB,#B3E5FC)';
            else if(hr<.7) wc='linear-gradient(180deg,#FFAB91,#FFE0B2)';
            else wc='linear-gradient(180deg,#283593,#3949AB)';

            const items=randItems(z,2+Math.floor(Math.random()*2));
            row.innerHTML=`
                <div class="floor-num" style="background:${z.wall}"><span>${f}</span></div>
                <div class="room">
                    <div class="room-animal">${z.animal}</div>
                    <div class="room-items">${items.map(i=>`<span>${i}</span>`).join('')}</div>
                    <div class="room-window" style="background:${wc};border-color:${z.wall}"></div>
                </div>`;
            c.appendChild(row);
            floorElements[f]=row;
        }
    }
}

// ═══════════════════════════════════════════
//  SCROLL & PLAYER
// ═══════════════════════════════════════════
function offTop(el,anc){let t=0,c=el;while(c&&c!==anc){t+=c.offsetTop;c=c.offsetParent}return t}

function scrollTo(floor,instant){
    const vp=$('viewport'),sc=$('buildingScroll'),vh=vp.clientHeight;
    const el=floor===0?document.querySelector('.foundation'):floorElements[floor];
    if(!el)return;
    const ot=offTop(el,sc), d=-(ot-vh/2+el.offsetHeight/2);
    if(instant){sc.style.transition='none';sc.style.transform=`translateY(${d}px)`;requestAnimationFrame(()=>sc.style.transition='transform .6s cubic-bezier(.4,0,.2,1)')}
    else sc.style.transform=`translateY(${d}px)`;
    posPlayer(floor);
}

function posPlayer(floor){
    const pl=$('player'),sc=$('buildingScroll');
    const el=floor===0?document.querySelector('.foundation'):floorElements[floor];
    if(!el)return;
    pl.style.top=(offTop(el,sc)+el.offsetHeight/2-20)+'px';
}

    gameActive=true;currentFloor=0;nextFloor=1;currentInput='';startTime=Date.now();
    $('startScreen').classList.add('hidden');
    $('gameWrap').classList.add('active');
    $('gameTitle').textContent=activeVar().title;
    buildTower();updateUI();drawSky();
    requestAnimationFrame(()=>{scrollTo(0,true);setTimeout(()=>scrollTo(1,false),300)});
}

function updateUI(){
    $('statNext').innerHTML=`つぎ: <strong>${nextFloor<=MAX_FLOOR?nextFloor:'---'}</strong>かい`;
    $('statFloor').innerHTML=`いま: <strong>${currentFloor}</strong>かい`;
    const z=getZone(Math.max(1,nextFloor<=MAX_FLOOR?nextFloor:currentFloor));
    $('statZone').textContent=`${z.animal} ${z.name}`;
    const pct=currentFloor/MAX_FLOOR*100;
    $('progFill').style.height=pct+'%';
    $('progChar').style.bottom=pct+'%';
    $('progLabel').textContent=Math.round(pct)+'%';
    document.querySelectorAll('.floor-row').forEach(r=>{
        r.classList.remove('current','cleared');
        const f=parseInt(r.dataset.floor);
        if(f<nextFloor) r.classList.add('cleared');
        if(f===nextFloor) r.classList.add('current');
    });
    $('hintBar').textContent=nextFloor<=MAX_FLOOR?`⌨️ 「${nextFloor}」を入力してね！`:'🎉 てっぺんに到着！';
}

function handleCorrect(floor){
    currentFloor=floor;nextFloor=floor+1;currentInput='';
    playClimb(floor);
    const pl=$('player');pl.classList.add('climbing');setTimeout(()=>pl.classList.remove('climbing'),600);
    const row=floorElements[floor];
    if(row) gsap.fromTo(row,{boxShadow:'inset 0 0 60px rgba(255,215,0,.8)'},{boxShadow:'inset 0 0 0px rgba(255,215,0,0)',duration:.8,ease:'power2.out'});
    showFeedback(floor,true);
    spawnConfetti(6);
    setTimeout(()=>{
        scrollTo(nextFloor<=MAX_FLOOR?nextFloor:currentFloor);
        updateUI();drawSky();
        if(floor%10===0&&floor<MAX_FLOOR) setTimeout(()=>showZoneCeleb(floor),400);
        if(floor>=MAX_FLOOR) setTimeout(()=>showGameOver(),600);
    },250);
}

function handleWrong(){
    currentInput='';playWrong();showFeedback(null,false);
    gsap.fromTo($('hintBar'),{x:-8},{x:0,duration:.4,ease:'elastic.out(1,.3)'});
}

function showFeedback(floor,ok){
    const d=$('inputDisplay');
    d.textContent=ok?floor:'✕';
    d.className='input-display show '+(ok?'correct':'wrong');
    gsap.fromTo(d,{scale:.5,opacity:0},{scale:1,opacity:1,duration:.25,ease:'back.out(1.7)'});
    setTimeout(()=>gsap.to(d,{scale:.8,opacity:0,duration:.2,onComplete:()=>d.className='input-display'}),ok?400:600);
}

function showTyping(t){const d=$('inputDisplay');d.textContent=t;d.className='input-display show';gsap.set(d,{scale:1,opacity:1})}
function hideTyping(){gsap.to($('inputDisplay'),{opacity:0,duration:.15,onComplete:()=>$('inputDisplay').className='input-display'})}

// ═══════════════════════════════════════════
//  CELEBRATIONS (auto-close 5s)
// ═══════════════════════════════════════════
function showZoneCeleb(floor){
    const zi=Math.floor((floor-1)/10), z=activeZones()[zi];
    playZoneClear();spawnConfetti(25);
    $('celebTitle').textContent='🎉 ゾーンクリア！ 🎉';
    $('celebEmoji').textContent=z.animal;
    $('celebDesc').textContent=`${z.name}さんのおうち (${zi*10+1}〜${floor}かい) クリア！`;
    $('celebration').classList.add('show');

    // Auto-close countdown
    let remain=5;
    $('celebCountdown').textContent=`${remain}びょうで じどうで とじるよ`;
    if(celebTimer) clearInterval(celebTimer);
    celebTimer=setInterval(()=>{
        remain--;
        if(remain<=0){closeCelebration();return}
        $('celebCountdown').textContent=`${remain}びょうで じどうで とじるよ`;
    },1000);
}

function closeCelebration(){
    $('celebration').classList.remove('show');
    if(celebTimer){clearInterval(celebTimer);celebTimer=null}
}

function showGameOver(){
    const el=Math.round((Date.now()-startTime)/1000);
    const m=Math.floor(el/60),s=el%60;
    playGameClear();spawnConfetti(50);
    $('goTitle').textContent='🎊 てっぺんに とうちゃく！ 🎊';
    $('goEmoji').textContent=activeVar().icon+'⭐🌟';
    $('goDesc').textContent=`${activeVar().title}、ぜんぶ のぼったよ！`;
    $('goStats').textContent=`⏱️ タイム: ${m}分${s}秒`;
    $('gameOver').classList.add('show');
    gameActive=false;
}

function backToMenu(){
    $('gameOver').classList.remove('show');closeCelebration();
    $('gameWrap').classList.remove('active');$('startScreen').classList.remove('hidden');
    gameActive=false;currentFloor=0;nextFloor=1;drawSky();
}
function retryGame(){$('gameOver').classList.remove('show');startGame()}

// ═══════════════════════════════════════════
//  EFFECTS
// ═══════════════════════════════════════════
function spawnConfetti(n){
    const cols=['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF6B9D','#C084FC','#FB923C','#34D399'];
    for(let i=0;i<n;i++){
        const e=document.createElement('div');e.className='confetti';
        e.style.background=cols[Math.floor(Math.random()*cols.length)];
        e.style.left=(20+Math.random()*60)+'vw';
        e.style.top=(20+Math.random()*30)+'vh';
        e.style.width=(6+Math.random()*8)+'px';
        e.style.height=(8+Math.random()*12)+'px';
        e.style.borderRadius=Math.random()>.5?'50%':'2px';
        document.body.appendChild(e);
        gsap.fromTo(e,{y:0,x:0,rotation:0,opacity:1},{y:200+Math.random()*300,x:(Math.random()-.5)*200,rotation:360+Math.random()*720,opacity:0,duration:1+Math.random()*1.5,ease:'power1.out',delay:i*.03,onComplete:()=>e.remove()});
    }
}

// ═══════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════
document.addEventListener('keydown',e=>{
    if(!gameActive||nextFloor>MAX_FLOOR)return;
    if(e.key>='0'&&e.key<='9'){
        currentInput+=e.key;showTyping(currentInput);
        const n=parseInt(currentInput);
        if(n===nextFloor) handleCorrect(n);
        else if(!String(nextFloor).startsWith(currentInput)) handleWrong();
    }else if(e.key==='Backspace'){
        e.preventDefault();currentInput=currentInput.slice(0,-1);
        currentInput?showTyping(currentInput):hideTyping();
    }else if(e.key==='Escape'){currentInput='';hideTyping()}
});

// Tap on floor
document.addEventListener('click',e=>{
    const row=e.target.closest('.floor-row');
    if(row&&gameActive){
        const f=parseInt(row.dataset.floor);
        if(f===nextFloor){currentInput='';handleCorrect(f)}
    }
});

// ═══════════════════════════════════════════
//  UI LISTENERS
// ═══════════════════════════════════════════
document.querySelectorAll('.var-btn').forEach(b=>{
    b.addEventListener('click',()=>{
        document.querySelectorAll('.var-btn').forEach(x=>x.classList.remove('selected'));
        b.classList.add('selected');
        selectedVar=b.dataset.var;
        // Update start screen icon & title
        document.querySelector('.start-building').textContent=activeVar().icon;
        document.querySelector('.start-title').textContent=activeVar().title;
    });
});

$('startBtn').addEventListener('click',startGame);
$('btnHome').addEventListener('click',backToMenu);
$('btnReset').addEventListener('click',()=>{if(confirm('リセットしますか？')){closeCelebration();startGame()}});

// ═══════════════════════════════════════════
//  MOBILE NUMPAD
// ═══════════════════════════════════════════
function createMobileNumpad(){
    if(!('ontouchstart' in window)&&innerWidth>768)return;
    const pad=document.createElement('div');pad.id='mobileNumpad';
    pad.style.cssText='position:fixed;bottom:46px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-wrap:wrap;gap:5px;justify-content:center;max-width:300px;padding:6px 10px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-radius:16px;box-shadow:0 -4px 20px rgba(0,0,0,.15)';
    const ns='width:44px;height:44px;font-size:1.2rem;font-weight:bold;border:none;border-radius:10px;cursor:pointer;color:#fff;box-shadow:0 3px 8px rgba(0,0,0,.2);font-family:inherit;transition:transform .1s;';
    for(let i=1;i<=9;i++){const b=document.createElement('button');b.textContent=i;b.style.cssText=ns+'background:linear-gradient(135deg,#8D6E63,#5D4037)';b.addEventListener('click',()=>document.dispatchEvent(new KeyboardEvent('keydown',{key:String(i)})));pad.appendChild(b)}
    const bk=document.createElement('button');bk.textContent='⌫';bk.style.cssText=ns+'background:linear-gradient(135deg,#EF5350,#C62828)';bk.addEventListener('click',()=>document.dispatchEvent(new KeyboardEvent('keydown',{key:'Backspace'})));pad.appendChild(bk);
    const z=document.createElement('button');z.textContent='0';z.style.cssText=ns+'background:linear-gradient(135deg,#8D6E63,#5D4037)';z.addEventListener('click',()=>document.dispatchEvent(new KeyboardEvent('keydown',{key:'0'})));pad.appendChild(z);
    const esc=document.createElement('button');esc.textContent='C';esc.style.cssText=ns+'background:linear-gradient(135deg,#78909C,#546E7A)';esc.addEventListener('click',()=>document.dispatchEvent(new KeyboardEvent('keydown',{key:'Escape'})));pad.appendChild(esc);
    $('gameWrap').appendChild(pad);
}

// ═══════════════════════════════════════════
//  I18N
// ═══════════════════════════════════════════
const translations={en:{title:'🏠 100-Story House 🏠'},ja:{title:'🏠 100かいだてのいえ 🏠'}};
i18n.init(translations,'100kadate');

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
createMobileNumpad();
</script>
