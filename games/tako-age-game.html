<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪁 New Year Kite Flying Number Game 🪁</title>
    <!-- Babylon.js – full PBR engine, glow, GPU particles, post-processing -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <!-- GSAP – UI animation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <!-- Tone.js – musical audio synthesis -->
    <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.min.js"></script>
    <!-- Local i18n -->
    <script src="../assets/i18n.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;height:100vh;font-family:'Segoe UI','Hiragino Sans',Arial,sans-serif;background:#000}
        #renderCanvas{position:fixed;top:0;left:0;width:100%;height:100%;outline:none;touch-action:none;z-index:0}

        .ui{position:relative;z-index:10;width:100%;height:100vh;pointer-events:none}
        .ui>*{pointer-events:auto}

        .glass{background:rgba(8,8,32,0.75);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(120,140,255,0.25);border-radius:22px;box-shadow:0 8px 40px rgba(0,0,0,0.5),0 0 30px rgba(80,100,200,0.08),inset 0 1px 0 rgba(255,255,255,0.06)}

        .hdr{position:absolute;top:16px;left:50%;transform:translateX(-50%);padding:16px 34px;z-index:100;text-align:center;animation:borderPulse 6s ease-in-out infinite}
        h1{font-size:2.1em;color:#fff;margin-bottom:10px;text-shadow:0 0 30px rgba(255,80,80,.7),0 0 60px rgba(255,120,60,.25),0 2px 6px rgba(0,0,0,.6);letter-spacing:3px}
        .stats{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
        .sb{background:linear-gradient(135deg,rgba(102,126,234,.9),rgba(118,75,162,.9));padding:10px 22px;border-radius:14px;color:#fff;font-size:1.15em;font-weight:bold;box-shadow:0 4px 18px rgba(102,126,234,.4),inset 0 1px 0 rgba(255,255,255,.12);border:1px solid rgba(140,160,255,.35);transition:all .3s;text-shadow:0 1px 4px rgba(0,0,0,.5)}
        .sb.fire{background:linear-gradient(135deg,rgba(255,80,0,.85),rgba(255,140,0,.85));box-shadow:0 0 30px rgba(255,80,0,.6),0 0 60px rgba(255,50,0,.3)}
        .sb.superfire{background:linear-gradient(135deg,rgba(255,0,60,.9),rgba(255,200,0,.9));box-shadow:0 0 50px rgba(255,50,0,.8),0 0 100px rgba(255,0,60,.4);animation:pfire .4s ease-in-out infinite alternate}
        @keyframes pfire{0%{transform:scale(1)}100%{transform:scale(1.08)}}
        @keyframes borderPulse{0%,100%{border-color:rgba(120,140,255,.25);box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 30px rgba(80,100,200,.08)}50%{border-color:rgba(255,140,100,.3);box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 40px rgba(255,120,80,.1)}}
        @keyframes scoreGlow{0%{text-shadow:0 0 10px currentColor}50%{text-shadow:0 0 25px currentColor,0 0 50px currentColor}100%{text-shadow:0 0 10px currentColor}}
        .lvl{background:linear-gradient(135deg,#ffd93d,#ff6b6b);padding:5px 16px;border-radius:10px;color:#fff;font-size:.95em;margin-top:7px;display:inline-block;font-weight:bold;box-shadow:0 2px 12px rgba(255,107,107,.4);animation:scoreGlow 3s ease-in-out infinite}

        .dsel{position:absolute;top:148px;left:50%;transform:translateX(-50%);padding:22px 30px;z-index:100;text-align:center;max-width:92%}
        .dsel h3{color:#fff;font-size:1.35em;margin-bottom:12px;text-shadow:0 1px 8px rgba(0,0,0,.3)}
        .msec{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.18)}
        .mbtns,.dbtns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

        .mbtn,.dbtn,.dirbtn{padding:13px 24px;font-size:1.05em;border:2px solid rgba(255,255,255,.2);color:#fff;border-radius:14px;cursor:pointer;transition:all .3s;font-weight:bold;text-shadow:0 1px 4px rgba(0,0,0,.3);background:none}
        .mbtn{background:linear-gradient(135deg,rgba(102,126,234,.7),rgba(118,75,162,.7))}
        .dbtn{background:linear-gradient(135deg,rgba(255,217,61,.65),rgba(107,207,127,.65))}
        .dirbtn{background:linear-gradient(135deg,rgba(255,217,61,.55),rgba(107,207,127,.55));padding:9px 16px;font-size:.95em}
        .mbtn:hover,.dbtn:hover,.dirbtn:hover{transform:scale(1.08) translateY(-2px);box-shadow:0 6px 25px rgba(255,255,255,.2),0 0 30px rgba(102,126,234,.15)}
        .mbtn.sel,.dbtn.sel,.dirbtn.sel{border-color:#ff6b6b;box-shadow:0 0 24px rgba(255,80,80,.5)}

        .sqset{margin-top:12px;padding:12px;background:rgba(100,130,255,.1);border:1px solid rgba(120,140,255,.15);border-radius:12px;display:none}
        .sqset.show{display:block}
        .sqset label{color:#fff;font-size:.95em;font-weight:bold;margin-right:6px}
        .sqset input{padding:7px 10px;font-size:.95em;border:2px solid rgba(255,255,255,.3);border-radius:10px;width:80px;text-align:center;background:rgba(255,255,255,.12);color:#fff}
        .sqset p{color:rgba(255,255,255,.75);font-size:.85em}

        .inst{position:absolute;bottom:105px;left:50%;transform:translateX(-50%);padding:12px 26px;font-size:1.15em;color:#fff;font-weight:bold;z-index:100;text-shadow:0 1px 8px rgba(0,0,0,.5),0 0 20px rgba(0,0,0,.3);white-space:nowrap}
        .ctrls{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:16px;z-index:100}
        .gbtn{padding:16px 32px;font-size:1.3em;border:none;border-radius:16px;cursor:pointer;font-weight:bold;color:#fff;box-shadow:0 6px 24px rgba(0,0,0,.3);transition:all .3s;border:1px solid rgba(255,255,255,.2)}
        .gbtn.st{background:linear-gradient(135deg,#667eea,#764ba2)}
        .gbtn.rs{background:linear-gradient(135deg,#f093fb,#f5576c)}
        .gbtn:hover{transform:translateY(-4px);box-shadow:0 10px 30px rgba(0,0,0,.4),0 0 40px rgba(102,126,234,.15)}
        .gbtn:disabled{opacity:.4;cursor:not-allowed;transform:none}

        .msgbox{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);padding:34px 52px;border-radius:28px;text-align:center;z-index:200;opacity:0}
        .msgbox.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
        .msgtxt{font-size:2.1em;color:#fff;font-weight:bold;text-shadow:0 0 24px rgba(255,80,80,.6)}

        .spop{position:fixed;font-size:2.1em;font-weight:900;pointer-events:none;z-index:50;text-shadow:0 0 20px currentColor,2px 2px 8px rgba(0,0,0,.5)}
        .ctxt{position:fixed;font-size:2.8em;font-weight:900;pointer-events:none;z-index:50;text-shadow:0 0 30px rgba(255,50,0,.8);color:#ff4500}
        #sflash{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;opacity:0}
        .rring{position:fixed;border-radius:50%;border:3px solid rgba(255,255,255,.8);box-shadow:0 0 24px rgba(100,200,255,.5),inset 0 0 24px rgba(100,200,255,.2);pointer-events:none;transform:translate(-50%,-50%);z-index:15}

        @media(max-width:768px){h1{font-size:1.4em}.hdr{padding:10px 16px}.sb{font-size:.9em;padding:7px 12px}.inst{font-size:.95em;bottom:85px}.gbtn{padding:12px 22px;font-size:1.05em}}
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>

    <div class="ui">
        <div class="hdr glass">
            <h1>🪁 凧揚げ数字ゲーム 🪁</h1>
            <div class="stats">
                <div class="sb" id="scoreBox">スコア: <span id="score">0</span></div>
                <div class="sb" id="timeBox">時間: <span id="time">60</span>秒</div>
                <div class="sb" id="comboBox">連続: <span id="combo">0</span></div>
            </div>
            <div class="lvl">レベル: <span id="level">1</span></div>
        </div>

        <div class="dsel glass" id="diffSel">
            <div class="msec">
                <h3>モードを選んでね！</h3>
                <div class="mbtns">
                    <button class="mbtn" data-mode="timeattack">⏱️ タイムアタック<br>(60秒)</button>
                    <button class="mbtn sel" data-mode="sequence">📚 順番モード<br>(時間制限なし)</button>
                </div>
                <div class="sqset show" id="sqSet">
                    <div style="margin-bottom:12px">
                        <label style="display:block;margin-bottom:7px">順番の方向:</label>
                        <div style="display:flex;gap:10px;justify-content:center">
                            <button class="dirbtn sel" id="ascBtn">⬆️ 昇順<br>(小→大)</button>
                            <button class="dirbtn" id="descBtn">⬇️ 降順<br>(大→小)</button>
                        </div>
                    </div>
                    <div style="margin-bottom:12px">
                        <label for="startN">開始:</label>
                        <input type="number" id="startN" value="0" min="0" max="100">
                        <span style="margin:0 6px;color:#fff">→</span>
                        <label for="endN">終了:</label>
                        <input type="number" id="endN" value="9" min="0" max="100">
                    </div>
                    <p>💡 昇順: 0→1→2…、降順: 100→99→98…<br>🎈 一桁の数だけ凧が出るよ！</p>
                </div>
            </div>
            <h3>難易度を選んでね！</h3>
            <div class="dbtns">
                <button class="dbtn sel" data-difficulty="easy">かんたん<br>(0-9)</button>
                <button class="dbtn" data-difficulty="medium">ふつう<br>(0-20)</button>
                <button class="dbtn" data-difficulty="hard">むずかしい<br>(0-50)</button>
                <button class="dbtn" data-difficulty="expert">超むずかしい<br>(0-100)</button>
            </div>
        </div>

        <div class="inst glass" id="inst">凧に書かれた数字をキーボードで入力してね！</div>

        <div class="msgbox glass" id="msgBox"><div class="msgtxt" id="msgTxt"></div></div>

        <div class="ctrls">
            <button class="gbtn st" id="startBtn">🎮 スタート</button>
            <button class="gbtn rs" id="resetBtn">🔄 リセット</button>
        </div>
    </div>
    <div id="sflash"></div>

<script>
// ─── i18n ───
const translations = {
    en:{title:"🪁 Kite Flying Number Game 🪁",score:"Score",time:"Time",combo:"Combo",seconds:"sec",start:"🎮 Start",reset:"🔄 Reset"},
    ja:{title:"🪁 凧揚げ数字ゲーム 🪁",score:"スコア",time:"時間",combo:"連続",seconds:"秒",start:"🎮 スタート",reset:"🔄 リセット"}
};
i18n.init(translations,'takoage');

// ─── STATE ───
let score=0,timeLeft=60,combo=0,level=1,gameActive=false,gameInterval,spawnInterval;
let currentInput='',difficulty='easy',maxNumber=9;
let gameMode='sequence',seqNum=0,startNum=0,seqDir='ascending',endNum=0;
let kites=[],kiteId=0;
const DS={easy:{max:9,rate:2000,spd:.8},medium:{max:20,rate:1500,spd:1},hard:{max:50,rate:1200,spd:1.3},expert:{max:100,rate:1000,spd:1.6}};
const $=id=>document.getElementById(id);
const scoreBox=$('scoreBox'),timeBox=$('timeBox'),comboBox=$('comboBox'),comboDisp=$('combo');
const levelDisp=$('level'),startBtn=$('startBtn'),resetBtn=$('resetBtn');
const msgBox=$('msgBox'),msgTxt=$('msgTxt'),inst=$('inst'),diffSel=$('diffSel');
const sqSet=$('sqSet'),startNI=$('startN'),endNI=$('endN'),ascBtn=$('ascBtn'),descBtn=$('descBtn');

// ─── TONE.JS AUDIO ───
let audioReady=false;
const mainSynth=new Tone.PolySynth(Tone.Synth,{oscillator:{type:'triangle8'},envelope:{attack:.01,decay:.25,sustain:.08,release:.5},volume:-8}).toDestination();
const bellSynth=new Tone.PolySynth(Tone.Synth,{oscillator:{type:'sine'},envelope:{attack:.005,decay:.4,sustain:0,release:.6},volume:-12}).toDestination();
const rev=new Tone.Reverb({decay:2,wet:.22}).toDestination();
mainSynth.connect(rev); bellSynth.connect(rev);
const noiseSynth=new Tone.NoiseSynth({noise:{type:'pink'},envelope:{attack:.005,decay:.18,sustain:0},volume:-20}).toDestination();

const pentatonic=['C4','D4','E4','G4','A4','C5','D5','E5','G5','A5','C6'];
async function ensureAudio(){if(!audioReady){await Tone.start();audioReady=true}}
function playCap(c){if(!audioReady)return;const n=pentatonic[Math.min(c,pentatonic.length-1)];mainSynth.triggerAttackRelease(n,'16n',Tone.now(),.25+c*.015);if(c>0&&c%5===0)bellSynth.triggerAttackRelease(['C5','E5','G5'],'8n',Tone.now(),.2)}
function playWrong(){if(!audioReady)return;mainSynth.triggerAttackRelease(['Eb3','A3'],'8n',Tone.now(),.15)}
function playLvl(){if(!audioReady)return;['C4','E4','G4','C5'].forEach((n,i)=>bellSynth.triggerAttackRelease(n,'8n',Tone.now()+i*.11,.25))}
function playFw(){if(!audioReady)return;noiseSynth.triggerAttackRelease('16n');setTimeout(()=>{for(let i=0;i<4;i++)setTimeout(()=>bellSynth.triggerAttackRelease(pentatonic[Math.floor(Math.random()*6)+4],'32n',Tone.now(),.1),i*40)},120)}

// ─── BABYLON.JS ENGINE ───
const canvas=$('renderCanvas');
const engine=new BABYLON.Engine(canvas,true,{stencil:true,preserveDrawingBuffer:true});
const scene=new BABYLON.Scene(engine);
scene.clearColor=new BABYLON.Color4(0,0,0,1);
scene.ambientColor=new BABYLON.Color3(.15,.15,.2);

// Camera
const cam=new BABYLON.FreeCamera("cam",new BABYLON.Vector3(0,6,28),scene);
cam.setTarget(new BABYLON.Vector3(0,6,0));
cam.inputs.clear();
const camBase=cam.position.clone();

// Lights
const hemiLight=new BABYLON.HemisphericLight("hemi",new BABYLON.Vector3(0,1,0),scene);
hemiLight.intensity=.38;hemiLight.diffuse=new BABYLON.Color3(1,.98,.92);hemiLight.groundColor=new BABYLON.Color3(.15,.35,.15);
const sunLight=new BABYLON.DirectionalLight("sun",new BABYLON.Vector3(-.3,-.6,-.5),scene);
sunLight.intensity=1.05;sunLight.diffuse=new BABYLON.Color3(1,.92,.7);
sunLight.position=new BABYLON.Vector3(20,35,-55);
const sunPt=new BABYLON.PointLight("sunPt",new BABYLON.Vector3(20,32,-55),scene);
sunPt.intensity=.4;sunPt.diffuse=new BABYLON.Color3(1,.9,.6);

// ─── POST-PROCESSING PIPELINE (bloom, DOF, chromatic aberration, vignette, grain) ───
const pipeline=new BABYLON.DefaultRenderingPipeline("pp",true,scene,[cam]);
pipeline.bloomEnabled=true;pipeline.bloomThreshold=.5;pipeline.bloomWeight=.28;pipeline.bloomKernel=64;pipeline.bloomScale=.35;
pipeline.chromaticAberrationEnabled=true;pipeline.chromaticAberration.aberrationAmount=8;pipeline.chromaticAberration.radialIntensity=.6;
pipeline.grainEnabled=true;pipeline.grain.intensity=4;pipeline.grain.animated=true;
pipeline.imageProcessing.vignetteEnabled=true;pipeline.imageProcessing.vignetteWeight=2.2;pipeline.imageProcessing.vignetteCameraFov=.6;
pipeline.imageProcessing.toneMappingEnabled=true;pipeline.imageProcessing.toneMappingType=BABYLON.ImageProcessingConfiguration.TONEMAPPING_ACES;
pipeline.imageProcessing.exposure=.92;pipeline.imageProcessing.contrast=1.08;
pipeline.fxaaEnabled=true;

// ─── GLOW LAYER (auto bloom on emissive meshes) ───
const glow=new BABYLON.GlowLayer("glow",scene,{mainTextureFixedSize:512,blurKernelSize:48});
glow.intensity=.35;

// ─── TEXTURES (procedural) ───
function makeDynTex(name,sz,drawFn){const dt=new BABYLON.DynamicTexture(name,sz,scene,false);drawFn(dt.getContext(),sz);dt.update();dt.hasAlpha=true;return dt}

const particleTex=makeDynTex("ptex",64,(c,s)=>{const g=c.createRadialGradient(32,32,0,32,32,32);g.addColorStop(0,'white');g.addColorStop(.4,'rgba(255,255,255,.6)');g.addColorStop(1,'rgba(255,255,255,0)');c.fillStyle=g;c.fillRect(0,0,s,s)});
const petalTex=makeDynTex("petal",64,(c)=>{c.fillStyle='white';c.beginPath();c.moveTo(32,4);c.bezierCurveTo(52,14,56,42,32,60);c.bezierCurveTo(8,42,12,14,32,4);c.fill()});
const flareTex=makeDynTex("flare",128,(c)=>{const g=c.createRadialGradient(64,64,0,64,64,64);g.addColorStop(0,'rgba(255,255,220,1)');g.addColorStop(.2,'rgba(255,220,140,.5)');g.addColorStop(.6,'rgba(255,180,80,.08)');g.addColorStop(1,'rgba(255,180,80,0)');c.fillStyle=g;c.fillRect(0,0,128,128)});

// ─── ENVIRONMENT: SKY ───
(function(){
    const dt=makeDynTex("sky",{width:2,height:1024},(c)=>{
        const g=c.createLinearGradient(0,0,0,1024);
        g.addColorStop(0,'#091428');g.addColorStop(.12,'#1b4fa0');g.addColorStop(.32,'#4a9ede');
        g.addColorStop(.52,'#87ceeb');g.addColorStop(.78,'#c8ecf8');g.addColorStop(1,'#dff0d8');
        c.fillStyle=g;c.fillRect(0,0,2,1024);
    });
    const mat=new BABYLON.StandardMaterial("skyM",scene);mat.emissiveTexture=dt;mat.disableLighting=true;mat.backFaceCulling=false;
    const sky=BABYLON.MeshBuilder.CreateSphere("sky",{diameter:500,sideOrientation:BABYLON.Mesh.BACKSIDE},scene);
    sky.material=mat;sky.isPickable=false;sky.infiniteDistance=true;
})();

// ─── SUN (mesh + glow) ───
const sunPos=new BABYLON.Vector3(20,32,-55);
(function(){
    const s=BABYLON.MeshBuilder.CreateSphere("sunMesh",{diameter:7},scene);
    s.position=sunPos.clone();
    const m=new BABYLON.PBRMaterial("sunMat",scene);
    m.emissiveColor=new BABYLON.Color3(1,.95,.6);m.emissiveIntensity=2.5;
    m.albedoColor=new BABYLON.Color3(0,0,0);m.metallic=0;m.roughness=1;
    m.unlit=true;s.material=m;s.isPickable=false;
    glow.addIncludedOnlyMesh(s);
})();

// ─── LENS FLARE ───
(function(){
    const lfs=new BABYLON.LensFlareSystem("lfs",sunPt,scene);
    const url=flareTex.getInternalTexture()?._hardwareTexture?._webGLTexture?null:"";
    // Use flareTex data: generate URL from canvas
    const fc=document.createElement('canvas');fc.width=fc.height=128;
    const fx=fc.getContext('2d');
    const fg=fx.createRadialGradient(64,64,0,64,64,64);
    fg.addColorStop(0,'rgba(255,255,220,1)');fg.addColorStop(.25,'rgba(255,220,140,.4)');fg.addColorStop(.7,'rgba(255,180,80,.05)');fg.addColorStop(1,'rgba(255,180,80,0)');
    fx.fillStyle=fg;fx.fillRect(0,0,128,128);
    const flareUrl=fc.toDataURL();
    new BABYLON.LensFlare(.4,0,new BABYLON.Color3(1,1,.85),flareUrl,lfs);
    new BABYLON.LensFlare(.15,.35,new BABYLON.Color3(1,.8,.5),flareUrl,lfs);
    new BABYLON.LensFlare(.1,.65,new BABYLON.Color3(.6,.85,1),flareUrl,lfs);
    new BABYLON.LensFlare(.08,.9,new BABYLON.Color3(.9,.7,1),flareUrl,lfs);
})();

// ─── MT. FUJI + MOUNTAINS ───
function mtn(x,y,z,r,h,col,snow){
    const m=BABYLON.MeshBuilder.CreateCylinder("mt",{diameterTop:0,diameterBottom:r*2,height:h,tessellation:7},scene);
    m.position=new BABYLON.Vector3(x,y+h/2,z);
    const mt=new BABYLON.PBRMaterial("mtM"+x,scene);mt.albedoColor=BABYLON.Color3.FromHexString(col);mt.metallic=0;mt.roughness=.85;m.material=mt;m.isPickable=false;
    if(snow){
        const s=BABYLON.MeshBuilder.CreateCylinder("sn",{diameterTop:0,diameterBottom:r*.7,height:h*.3,tessellation:7},scene);
        s.position=new BABYLON.Vector3(x,y+h*.88,z);
        const sm=new BABYLON.PBRMaterial("snM",scene);sm.albedoColor=new BABYLON.Color3(1,1,1);sm.emissiveColor=new BABYLON.Color3(.12,.12,.18);sm.metallic=0;sm.roughness=.7;
        s.material=sm;s.isPickable=false;
    }
}
mtn(0,-6,-65,16,30,'#5a4aad',true);
mtn(-32,-6,-55,10,18,'#6a5a45',false);
mtn(34,-6,-55,12,20,'#7a6a55',false);
mtn(-52,-6,-55,8,13,'#5a7a4a',false);
mtn(56,-6,-58,9,15,'#6a6a5a',false);

// ─── GROUND ───
(function(){
    const g=BABYLON.MeshBuilder.CreateGround("gnd",{width:300,height:80},scene);
    g.position.y=-6;g.position.z=-10;
    const m=new BABYLON.PBRMaterial("gndM",scene);m.albedoColor=BABYLON.Color3.FromHexString('#2d8b46');m.metallic=0;m.roughness=.9;
    g.material=m;g.isPickable=false;
    // Lighter grass strip
    const g2=BABYLON.MeshBuilder.CreateGround("grass",{width:300,height:6},scene);
    g2.position.y=-5.9;g2.position.z=8;
    const m2=new BABYLON.PBRMaterial("grassM",scene);m2.albedoColor=BABYLON.Color3.FromHexString('#4dba6a');m2.metallic=0;m2.roughness=.85;
    g2.material=m2;g2.isPickable=false;
})();

// ─── CLOUDS (sprites drifting) ───
const clouds=[];
const cloudTex=makeDynTex("cloud",256,(c)=>{const g=c.createRadialGradient(128,128,20,128,128,120);g.addColorStop(0,'rgba(255,255,255,.92)');g.addColorStop(.5,'rgba(255,255,255,.35)');g.addColorStop(1,'rgba(255,255,255,0)');c.fillStyle=g;c.fillRect(0,0,256,256)});
const cloudMgr=new BABYLON.SpriteManager("cloudMgr","",15,{width:256,height:256},scene);
cloudMgr.texture=cloudTex;
for(let i=0;i<15;i++){
    const s=new BABYLON.Sprite("c"+i,cloudMgr);
    const sc=6+Math.random()*12;

// ─── KITE SYSTEM ───
const kiteColors=[['#ff6b6b','#c44569'],['#4facfe','#00c6fb'],['#43e97b','#38d9a9'],['#fa709a','#fee140'],['#a18cd1','#fbc2eb'],['#f7971e','#ffd200'],['#00b4db','#0083b0'],['#7f53ac','#647dee'],['#e44d26','#f16529']];

function createKiteTex(num){
    return makeDynTex("kt"+kiteId,{width:512,height:512},(c)=>{
        c.clearRect(0,0,512,512);
        c.save();c.beginPath();c.moveTo(256,16);c.lineTo(496,256);c.lineTo(256,496);c.lineTo(16,256);c.closePath();c.clip();
        const p=kiteColors[Math.floor(Math.random()*kiteColors.length)];
        const g=c.createLinearGradient(0,0,512,512);g.addColorStop(0,p[0]);g.addColorStop(1,p[1]);
        c.fillStyle=g;c.fillRect(0,0,512,512);
        // Inner glow
        const ig=c.createRadialGradient(256,256,40,256,256,230);ig.addColorStop(0,'rgba(255,255,255,.28)');ig.addColorStop(1,'rgba(255,255,255,0)');c.fillStyle=ig;c.fillRect(0,0,512,512);
        // Cross struts
        c.strokeStyle='rgba(255,255,255,.3)';c.lineWidth=3;c.beginPath();c.moveTo(256,16);c.lineTo(256,496);c.moveTo(16,256);c.lineTo(496,256);c.stroke();
        // Decorative border
        c.strokeStyle='rgba(255,255,255,.18)';c.lineWidth=5;
        c.beginPath();c.moveTo(256,50);c.lineTo(462,256);c.lineTo(256,462);c.lineTo(50,256);c.closePath();c.stroke();
        c.strokeStyle='rgba(255,255,255,.1)';c.lineWidth=2;
        c.beginPath();c.moveTo(256,90);c.lineTo(422,256);c.lineTo(256,422);c.lineTo(90,256);c.closePath();c.stroke();
        // Number
        c.font=`bold ${num>9?140:180}px Arial`;c.textAlign='center';c.textBaseline='middle';
        c.shadowColor='rgba(0,0,0,.7)';c.shadowBlur=20;c.shadowOffsetX=4;c.shadowOffsetY=4;
        c.lineWidth=8;c.strokeStyle='rgba(0,0,0,.5)';c.strokeText(String(num),256,256);
        c.shadowColor='rgba(255,255,255,.6)';c.shadowBlur=15;c.shadowOffsetX=0;c.shadowOffsetY=0;
        c.fillStyle='#fff';c.fillText(String(num),256,256);
        c.restore();
    });
}

function createKite(num,wx,wy,wz){
    const id=kiteId++;
    const root=new BABYLON.TransformNode("kr"+id,scene);

    // Kite face (PBR + emissive for glow)
    const tex=createKiteTex(num);
    const mat=new BABYLON.PBRMaterial("km"+id,scene);
    mat.albedoTexture=tex;mat.useAlphaFromAlbedoTexture=true;
    mat.transparencyMode=BABYLON.PBRMaterial.PBRMATERIAL_ALPHABLEND;
    mat.backFaceCulling=false;mat.metallic=.12;mat.roughness=.35;
    mat.emissiveColor=new BABYLON.Color3(.1,.07,.07);mat.emissiveIntensity=.6;
    const mesh=BABYLON.MeshBuilder.CreatePlane("kp"+id,{width:3.8,height:3.8},scene);
    mesh.material=mat;mesh.parent=root;mesh.rotation.y=Math.PI;

    // Hit sphere (invisible, generous size)
    const hit=BABYLON.MeshBuilder.CreateSphere("kh"+id,{diameter:5},scene);
    hit.parent=root;hit.isVisible=false;hit.isPickable=true;
    hit.metadata={isKite:true,kiteId:id};

    // String
    const sPts=[];for(let i=0;i<=20;i++){const t=i/20;sPts.push(new BABYLON.Vector3(0,-t*14,0))}
    let str=BABYLON.MeshBuilder.CreateLines("ks"+id,{points:sPts,updatable:true},scene);
    str.parent=root;str.color=new BABYLON.Color3(.55,.37,.24);str.alpha=.55;str.isPickable=false;

    // Tail ribbons
    const tailN=new BABYLON.TransformNode("kt"+id,scene);tailN.parent=root;tailN.position.y=-2;
    const tc=[new BABYLON.Color3(1,.85,.24),new BABYLON.Color3(.42,.81,.5),new BABYLON.Color3(.3,.59,1),new BABYLON.Color3(1,.42,.42)];
    const ribbons=[];
    for(let i=0;i<4;i++){
        const r=BABYLON.MeshBuilder.CreatePlane("tr"+id+"_"+i,{width:.45,height:1.3},scene);
        const rm=new BABYLON.StandardMaterial("trm"+id+"_"+i,scene);rm.diffuseColor=tc[i%4];rm.emissiveColor=tc[i%4].scale(.3);rm.backFaceCulling=false;rm.alpha=.8;
        r.material=rm;r.parent=tailN;r.position.y=-i*1.4;r.isPickable=false;ribbons.push(r);
    }

    root.position=new BABYLON.Vector3(wx,wy+28,wz);// start above

    const obj={id,num:num,root,mesh,hit,str,tailN,ribbons,targetY:wy,phase:Math.random()*Math.PI*2,
        swaySpd:.35+Math.random()*.3,swayAmt:.5+Math.random()*.4,entering:true,captured:false,sPts,mat};
    kites.push(obj);
    // glow
    glow.addIncludedOnlyMesh(mesh);
    return obj;
}

function updateKites(t,dt){
    kites.forEach(k=>{
        if(k.captured)return;
        // Entry
        if(k.entering){
            const dy=(k.targetY-k.root.position.y)*.04;
            k.root.position.y+=dy;
            if(Math.abs(k.root.position.y-k.targetY)<.15){k.entering=false;k.root.position.y=k.targetY}
        }
        // Sway & bob
        k.root.position.y=(k.entering?k.root.position.y:k.targetY)+Math.sin(t*.8+k.phase)*.45;
        k.root.rotation.z=Math.sin(t*k.swaySpd*.7+k.phase)*.09;
        k.root.rotation.y=Math.sin(t*k.swaySpd*.5+k.phase)*.14;
        k.root.rotation.x=Math.sin(t*k.swaySpd*.3+k.phase)*.05;
        // String wave
        const pts=[];
        for(let i=0;i<=20;i++){const u=i/20;pts.push(new BABYLON.Vector3(Math.sin(u*Math.PI+t*2+k.phase)*.3*u,-u*14,0))}
        k.str=BABYLON.MeshBuilder.CreateLines(null,{points:pts,instance:k.str});
        // Tail flutter
        k.ribbons.forEach((r,i)=>{r.position.x=Math.sin(t*3+i*.8+k.phase)*.5;r.rotation.z=Math.sin(t*2.5+i*.6+k.phase)*.45});
    });
}

const activeExplosions=[];
function makeExplosion(pos,count,additive,big){
    const ps=new BABYLON.ParticleSystem("ex"+(Date.now()),count||100,scene);
    ps.particleTexture=particleTex;
    ps.emitter=pos.clone();
    ps.minEmitBox=BABYLON.Vector3.Zero();ps.maxEmitBox=BABYLON.Vector3.Zero();
    const spd=big?12:8;
    ps.direction1=new BABYLON.Vector3(-spd,spd*.7,-spd*.4);
    ps.direction2=new BABYLON.Vector3(spd,spd*1.2,spd*.4);
    ps.minLifeTime=.3;ps.maxLifeTime=big?1.5:1;
    ps.minSize=.15;ps.maxSize=big?.7:.45;
    ps.gravity=new BABYLON.Vector3(0,-12,0);
    ps.blendMode=additive?BABYLON.ParticleSystem.BLENDMODE_ADD:BABYLON.ParticleSystem.BLENDMODE_STANDARD;
    ps.color1=new BABYLON.Color4(1,.85,.2,1);
    ps.color2=new BABYLON.Color4(1,.35,.35,1);
    ps.colorDead=new BABYLON.Color4(.4,.1,.6,0);
    ps.emitRate=0;ps.manualEmitCount=count||100;
    ps.minAngularSpeed=-4;ps.maxAngularSpeed=4;
    ps.addColorGradient(0,new BABYLON.Color4(1,1,.8,1));
    ps.addColorGradient(.4,new BABYLON.Color4(1,.5,.2,1));
    ps.addColorGradient(1,new BABYLON.Color4(.3,.1,.5,0));
    ps.start();
    const ttl=big?2500:1800;
    setTimeout(()=>{ps.stop();setTimeout(()=>ps.dispose(),1500)},ttl);
}

function makeFirework(pos){
    const hue=Math.random();
    const c1=BABYLON.Color3.FromHSV(hue*360,.9,.95);
    const c2=BABYLON.Color3.FromHSV(((hue+.15)%1)*360,.8,.85);
    const ps=new BABYLON.ParticleSystem("fw"+(Date.now()),200,scene);
    ps.particleTexture=particleTex;ps.emitter=pos.clone();
    ps.minEmitBox=BABYLON.Vector3.Zero();ps.maxEmitBox=BABYLON.Vector3.Zero();
    ps.direction1=new BABYLON.Vector3(-6,-6,-6);ps.direction2=new BABYLON.Vector3(6,6,6);
    ps.minLifeTime=.5;ps.maxLifeTime=2;ps.minSize=.12;ps.maxSize=.4;
    ps.gravity=new BABYLON.Vector3(0,-5,0);
    ps.blendMode=BABYLON.ParticleSystem.BLENDMODE_ADD;
    ps.color1=new BABYLON.Color4(c1.r,c1.g,c1.b,1);ps.color2=new BABYLON.Color4(c2.r,c2.g,c2.b,1);
    ps.colorDead=new BABYLON.Color4(c1.r*.3,c1.g*.3,c1.b*.3,0);
    ps.emitRate=0;ps.manualEmitCount=200;
    ps.minAngularSpeed=-3;ps.maxAngularSpeed=3;
    ps.start();playFw();
    setTimeout(()=>{ps.stop();setTimeout(()=>ps.dispose(),2500)},2200);
}

// ─── GAME LOGIC ───
function takoCount(n){if(gameMode!=='sequence')return 1;const o=n%10;return o===0?10:o}

function spawnTako(){
    if(!gameActive)return;
    let num;
    if(gameMode==='sequence'){
        num=seqNum;
        if((seqDir==='ascending'&&seqNum>endNum)||(seqDir==='descending'&&seqNum<endNum))return;
        const tgt=takoCount(seqNum),ex=kites.filter(k=>k.num===seqNum&&!k.captured).length;
        if(ex>=tgt)return;
        const idx=ex,sp=28/Math.max(tgt,1);
        createKite(num,-14+sp*idx+sp*.5, 3+Math.random()*11, -5+Math.random()*8);
    } else {
        num=Math.floor(Math.random()*(maxNumber+1));
        createKite(num,(Math.random()-.5)*24, 3+Math.random()*14, -8+Math.random()*12);
    }
}

function captureTako(k){
    if(k.captured)return;
    const cn=k.num;
    let caps=[k];
    if(gameMode==='sequence')caps=kites.filter(x=>x.num===cn&&!x.captured);

    const pts=10+combo*2+(level-1)*5;
    score+=pts;combo++;
    playCap(combo);updateDisplay();
    gsap.fromTo(scoreBox,{scale:1.15},{scale:1,duration:.3,ease:'elastic.out(1,.5)'});

    caps.forEach((c,i)=>{
        c.captured=true;
        const p=c.root.position.clone();
        setTimeout(()=>{
            // Animate capture
            gsap.to(c.root.scaling,{x:2.5,y:2.5,z:2.5,duration:.32,ease:'power2.out'});
            gsap.to(c.root.rotation,{z:Math.PI*3,y:Math.PI*2,duration:.4,ease:'power2.in'});
            if(c.mat)gsap.to(c.mat,{alpha:0,duration:.3,delay:.1});
            makeExplosion(p,80+(combo>5?40:0),true,combo>=10);
            setTimeout(()=>{c.root.dispose();},500);
        },i*70);
    });

    screenFlash(combo>=10?'#ff4400':combo>=5?'#ffaa00':'#fff',.15);
    camShake(.18+Math.min(combo*.04,.5),.18);
    if(combo>=3)fovPulse();
    showPopup(k.root.position,pts,false);
    if(combo>0&&combo%5===0)showPopup(k.root.position.add(new BABYLON.Vector3(0,2,0)),0,true);
    updateComboFX();

    caps.forEach(c=>{const i=kites.indexOf(c);if(i>-1)kites.splice(i,1)});

    if(gameMode==='sequence'){
        seqDir==='ascending'?seqNum++:seqNum--;
        const done=seqDir==='ascending'?seqNum>endNum:seqNum<endNum;
        if(done){setTimeout(()=>{endGame();showMsg('🎉 すべての数字をクリアしました！ 🎉<br>スコア: '+score+'点',true)},600)}
        else{
            const d=seqDir==='ascending'?'→':'←';
            inst.textContent=`数字 ${seqNum} の凧を探そう！ (${startNum}${d}${endNum})`;
            setTimeout(()=>{const tc=takoCount(seqNum);for(let i=0;i<tc;i++)setTimeout(()=>spawnTako(),i*200)},400);
        }
        const prog=Math.abs(seqNum-startNum);
        if(prog%10===0&&prog>0)levelUp();
    }
}

function updateComboFX(){comboBox.classList.remove('fire','superfire');if(combo>=10)comboBox.classList.add('superfire');else if(combo>=5)comboBox.classList.add('fire')}
function levelUp(){level++;levelDisp.textContent=level;playLvl();showMsg('🌟 レベル '+level+'！🌟');for(let i=0;i<4;i++)setTimeout(()=>makeFirework(new BABYLON.Vector3((Math.random()-.5)*22,10+Math.random()*12,-5)),i*280);screenFlash('#ffd700',.28)}

function startGame(){
    if(gameActive)return;
    ensureAudio();
    gameActive=true;score=0;combo=0;level=1;currentInput='';
    clearKites();
    if(gameMode==='sequence'){
        timeLeft=0;
        startNum=parseInt(startNI.value)||0;
        endNum=parseInt(endNI.value)||(seqDir==='ascending'?maxNumber:0);
        seqNum=startNum;
        const d=seqDir==='ascending'?'→':'←';
        inst.textContent=`数字 ${seqNum} の凧を探そう！ (${startNum}${d}${endNum})`;
    }else{timeLeft=60;inst.textContent='数字を入力して凧を撃ち落とせ！'}
    updateDisplay();startBtn.disabled=true;
    gsap.to(diffSel,{opacity:0,y:-30,duration:.4,onComplete:()=>diffSel.style.display='none'});
    const rate=gameMode==='sequence'?500:DS[difficulty].rate;
    spawnInterval=setInterval(spawnTako,rate);
    if(gameMode==='timeattack'){
        gameInterval=setInterval(()=>{timeLeft--;updateDisplay();if(timeLeft<=0)endGame();const nl=Math.floor(score/30)+1;if(nl>level)levelUp()},1000);
    }
    if(gameMode==='sequence'){const tc=takoCount(seqNum);for(let i=0;i<tc;i++)setTimeout(()=>spawnTako(),i*300)}
    else{for(let i=0;i<3;i++)setTimeout(()=>spawnTako(),i*800)}
}

function endGame(){
    gameActive=false;clearInterval(gameInterval);clearInterval(spawnInterval);clearKites();
    let msg='';
    if(gameMode==='sequence'){const cl=Math.abs(seqNum-startNum),tot=Math.abs(endNum-startNum)+1;msg=cl>=tot?'🎉 完璧！全部クリア！ 🎉':`🌟 ${cl}個の数字をクリア！`}
    else{msg=score>=100?'🏆 凧揚げ名人！すごい！ 🏆':score>=70?'🌟 とってもすばらしい！':score>=40?'👏 よくできました！':'😊 がんばりました！'}
    for(let i=0;i<10;i++)setTimeout(()=>makeFirework(new BABYLON.Vector3((Math.random()-.5)*30,8+Math.random()*16,-5+Math.random()*10)),i*350);
    showMsg(msg+'<br>スコア: '+score+'点',true);
    startBtn.disabled=false;startBtn.textContent='🎮 もう一度';
    diffSel.style.display='block';gsap.fromTo(diffSel,{opacity:0,y:-20},{opacity:1,y:0,duration:.5,delay:.5});
    inst.textContent='凧に書かれた数字をキーボードで入力してね！';
}

function clearKites(){kites.forEach(k=>k.root.dispose());kites=[]}

function resetGame(){
    gameActive=false;clearInterval(gameInterval);clearInterval(spawnInterval);clearKites();
    score=0;timeLeft=60;combo=0;level=1;currentInput='';seqNum=0;gameMode='sequence';seqDir='ascending';
    updateDisplay();updateComboFX();
    startBtn.disabled=false;startBtn.textContent='🎮 スタート';
    diffSel.style.display='block';gsap.fromTo(diffSel,{opacity:0},{opacity:1,duration:.4});
    inst.textContent='凧に書かれた数字をキーボードで入力してね！';
    gsap.to(msgBox,{scale:0,opacity:0,duration:.3,onComplete:()=>msgBox.classList.remove('show')});
    document.querySelectorAll('.mbtn').forEach(b=>b.classList.remove('sel'));
    document.querySelector('.mbtn[data-mode="sequence"]').classList.add('sel');

    document.querySelectorAll('.dirbtn').forEach(b=>b.classList.remove('sel'));

}

function updateDisplay(){
    if(gameMode==='sequence'){
        let p,t;
        if(seqDir==='ascending'){p=seqNum-startNum;t=endNum-startNum+1}else{p=startNum-seqNum;t=startNum-endNum+1}
        const o=seqNum%10,tc=o===0?10:o;
        scoreBox.innerHTML=`進捗: <strong>${p}/${t}</strong>`;
        timeBox.innerHTML=`次: <strong>${seqNum}</strong> (×${tc})`;
    }else{scoreBox.innerHTML=`スコア: <strong>${score}</strong>`;timeBox.innerHTML=`時間: <strong>${timeLeft}</strong>秒`}
    comboDisp.textContent=combo;levelDisp.textContent=level;
}

// ─── KEYBOARD ───
document.addEventListener('keydown',e=>{
    if(!gameActive)return;
    if(e.key>='0'&&e.key<='9'){
        currentInput+=e.key;const n=parseInt(currentInput);
        if(gameMode==='sequence'){
            const d=seqDir==='ascending'?'→':'←';
            inst.textContent=`数字 ${seqNum} の凧を探そう！ (${startNum}${d}${endNum}) [入力: ${currentInput}]`;
            const m=kites.find(k=>k.num===n&&k.num===seqNum&&!k.captured);
            if(m){captureTako(m);currentInput=''}
            else if(n!==seqNum&&!String(seqNum).startsWith(currentInput)){
                currentInput='';combo=0;updateDisplay();updateComboFX();playWrong();camShake(.28,.12);
                inst.textContent=`違うよ！数字 ${seqNum} を探そう！`;
                setTimeout(()=>{if(gameActive)inst.textContent=`数字 ${seqNum} の凧を探そう！ (${startNum}${d}${endNum})`},1000);
            }
        }else{
            inst.textContent='入力中: '+currentInput;
            const m=kites.find(k=>k.num===n&&!k.captured);
            if(m){captureTako(m);currentInput=''}
            else if(!kites.some(k=>!k.captured&&String(k.num).startsWith(currentInput))){
                currentInput='';combo=0;updateDisplay();updateComboFX();playWrong();camShake(.28,.12);
                inst.textContent='その数字の凧はないよ！';
                setTimeout(()=>{if(gameActive)inst.textContent='数字を入力して凧を撃ち落とせ！'},1000);
            }
        }
    }else if(e.key==='Backspace'){
        currentInput=currentInput.slice(0,-1);
        if(gameMode==='sequence'){const d=seqDir==='ascending'?'→':'←';inst.textContent=currentInput?`数字 ${seqNum} の凧を探そう！ [入力: ${currentInput}]`:`数字 ${seqNum} の凧を探そう！ (${startNum}${d}${endNum})`}
        else inst.textContent=currentInput?'入力中: '+currentInput:'数字を入力して凧を撃ち落とせ！';
    }else if(e.key==='Escape'){
        currentInput='';
        if(gameMode==='sequence'){const d=seqDir==='ascending'?'→':'←';inst.textContent=`数字 ${seqNum} の凧を探そう！ (${startNum}${d}${endNum})`}
        else inst.textContent='数字を入力して凧を撃ち落とせ！';
    }
});

// ─── UI LISTENERS ───
document.querySelectorAll('.mbtn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.mbtn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');gameMode=b.dataset.mode;gameMode==='sequence'?sqSet.classList.add('show'):sqSet.classList.remove('show')}));
ascBtn.addEventListener('click',()=>{document.querySelectorAll('.dirbtn').forEach(b=>b.classList.remove('sel'));ascBtn.classList.add('sel');seqDir='ascending';startNI.value='0';endNI.value='9'});
descBtn.addEventListener('click',()=>{document.querySelectorAll('.dirbtn').forEach(b=>b.classList.remove('sel'));descBtn.classList.add('sel');seqDir='descending';startNI.value='100';endNI.value='0'});
startNI.addEventListener('change',()=>{const s=parseInt(startNI.value);if(seqDir==='ascending'){if(parseInt(endNI.value)<=s)endNI.value=Math.min(s+10,maxNumber)}else{if(parseInt(endNI.value)>=s)endNI.value=Math.max(s-10,0)}});
document.querySelectorAll('.dbtn').forEach(b=>b.addEventListener('click',()=>{if(!b.dataset.difficulty)return;document.querySelectorAll('.dbtn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');difficulty=b.dataset.difficulty;maxNumber=DS[difficulty].max;startNI.max=maxNumber;endNI.max=maxNumber;if(seqDir==='ascending'){startNI.value=0;endNI.value=maxNumber}else{startNI.value=maxNumber;endNI.value=0}}));
startBtn.addEventListener('click',startGame);
resetBtn.addEventListener('click',resetGame);

// ─── RENDER LOOP ───
let elapsed=0;
scene.registerBeforeRender(()=>{
    const dt=engine.getDeltaTime()/1000;
    elapsed+=dt;
    // Camera gentle breathing
    cam.position.x=camBase.x+Math.sin(elapsed*.15)*.45;
    cam.position.y=camBase.y+Math.sin(elapsed*.2)*.3;
    cam.setTarget(new BABYLON.Vector3(Math.sin(elapsed*.1)*.2,6,0));
    // Clouds drift
    clouds.forEach(c=>{c.position.x+=c._speed*dt;if(c.position.x>65)c.position.x=-65});
    // Kites
    updateKites(elapsed,dt);
});
engine.runRenderLoop(()=>scene.render());
window.addEventListener('resize',()=>engine.resize());
</script>
</body>
</html>
