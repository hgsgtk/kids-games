<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Typing Game 🔢</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            background: #0a0a2e;
        }

        /* Animated starfield background */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Particle canvas for celebrations */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 35px;
            padding: 30px;
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 380px;
            grid-template-rows: auto 1fr auto;
            gap: 25px;
            box-shadow:
                0 25px 80px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: containerAppear 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes containerAppear {
            0% { opacity: 0; transform: scale(0.9) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        h1 {
            grid-column: 1 / -1;
            text-align: center;
            margin: 0;
            font-family: 'Fredoka One', cursive;
            font-size: 2.8em;
            background: linear-gradient(135deg, #FF6B6B, #FFD93D, #6BCB77, #4D96FF, #9B59B6);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rainbowText 4s ease infinite;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        }

        @keyframes rainbowText {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Stats */
        .stats {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .stat-box {
            background: linear-gradient(135deg, rgba(255, 217, 61, 0.2) 0%, rgba(255, 167, 38, 0.2) 100%);
            color: white;
            padding: 16px 20px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid rgba(255, 217, 61, 0.4);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { transform: translate(-30%, -30%); }
            50% { transform: translate(30%, 30%); }
        }

        .stat-label {
            font-size: 1.1em;
            font-weight: 700;
            margin-bottom: 6px;
            opacity: 0.9;
        }

        .stat-value {
            font-family: 'Fredoka One', cursive;
            font-size: 2.2em;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(255, 217, 61, 0.5);
        }

        /* Streak counter */
        .streak-box {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.2) 0%, rgba(255, 75, 43, 0.3) 100%);
            border: 2px solid rgba(255, 107, 107, 0.5);
        }

        .streak-box .stat-value {
            text-shadow: 0 2px 10px rgba(255, 107, 107, 0.5);
        }

        .streak-box.on-fire {
            animation: fireGlow 0.5s ease infinite alternate;
            border-color: #ff4500;
        }

        @keyframes fireGlow {
            0% { box-shadow: 0 0 20px rgba(255, 69, 0, 0.3); }
            100% { box-shadow: 0 0 40px rgba(255, 69, 0, 0.6); }
        }

        /* Number display area */
        .number-display {
            background: linear-gradient(160deg, rgba(30, 15, 60, 0.6) 0%, rgba(15, 30, 60, 0.6) 100%);
            border-radius: 30px;
            padding: 35px;
            text-align: center;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 107, 107, 0.3);
            box-shadow:
                0 10px 40px rgba(0, 0, 0, 0.3),
                inset 0 0 60px rgba(255, 107, 107, 0.05);
            position: relative;
            overflow: hidden;
            transition: border-color 0.5s, box-shadow 0.5s;
        }

        .number-display::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            animation: displaySweep 4s ease-in-out infinite;
        }

        @keyframes displaySweep {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        .animal-display {
            font-size: 3em;
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.4));
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 5px;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            animation: animalFloat 3s ease-in-out infinite;
        }

        @keyframes animalFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.05); }
        }

        .target-number {
            font-family: 'Fredoka One', cursive;
            font-size: 6.5em;
            font-weight: bold;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53, #FFD93D);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: numberGlow 2s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(255, 107, 107, 0.4));
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .target-number.number-enter {
            animation: numberEnter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes numberGlow {
            0%, 100% { background-position: 0% 50%; filter: drop-shadow(0 0 30px rgba(255, 107, 107, 0.4)); }
            50% { background-position: 100% 50%; filter: drop-shadow(0 0 50px rgba(255, 217, 61, 0.6)); }
        }

        @keyframes numberEnter {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            60% { transform: scale(1.3) rotate(5deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        .animal-name {
            font-size: 1.8em;
            font-weight: 900;
            color: rgba(77, 150, 255, 0.9);
            margin-top: 12px;
            text-shadow: 0 2px 10px rgba(77, 150, 255, 0.3);
            animation: nameAppear 0.5s ease;
        }

        @keyframes nameAppear {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Input area */
        .input-area {
            width: 100%;
            position: relative;
        }

        #userInput {
            width: 100%;
            padding: 22px;
            font-family: 'Fredoka One', cursive;
            font-size: 4.5em;
            text-align: center;
            background: rgba(255, 255, 255, 0.06);
            border: 3px solid rgba(77, 150, 255, 0.5);
            border-radius: 22px;
            outline: none;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: 4px;
            font-weight: bold;
            color: white;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            caret-color: #FFD93D;
        }

        #userInput::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        #userInput:focus {
            border-color: rgba(255, 107, 107, 0.8);
            box-shadow:
                0 0 0 5px rgba(255, 107, 107, 0.15),
                0 8px 30px rgba(255, 107, 107, 0.2);
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.08);
        }

        #userInput.correct {
            border-color: #6BCB77;
            background: rgba(107, 203, 119, 0.15);
            box-shadow:
                0 0 0 5px rgba(107, 203, 119, 0.2),
                0 0 40px rgba(107, 203, 119, 0.3);
            animation: correctPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes correctPop {
            0% { transform: scale(1); }
            30% { transform: scale(1.08); }
            60% { transform: scale(0.97); }
            100% { transform: scale(1); }
        }

        #userInput.incorrect {
            border-color: #FF6B6B;
            background: rgba(255, 107, 107, 0.15);
            animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            20% { transform: translateX(-12px) rotate(-3deg); }
            40% { transform: translateX(12px) rotate(3deg); }
            60% { transform: translateX(-8px) rotate(-2deg); }
            80% { transform: translateX(8px) rotate(2deg); }
        }

        /* Controls */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .jump-controls {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 20px;
            border: 2px solid rgba(255, 107, 107, 0.2);
        }

        .jump-label {
            font-weight: bold;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1em;
            margin-bottom: 8px;
            text-align: center;
        }

        .jump-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .jump-btn {
            padding: 10px;
            font-size: 1em;
            font-weight: bold;
            background: linear-gradient(135deg, rgba(77, 150, 255, 0.3) 0%, rgba(107, 203, 119, 0.3) 100%);
            color: white;
            border: 2px solid rgba(77, 150, 255, 0.3);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .jump-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(77, 150, 255, 0.3);
            border-color: rgba(77, 150, 255, 0.6);
            background: linear-gradient(135deg, rgba(77, 150, 255, 0.5) 0%, rgba(107, 203, 119, 0.5) 100%);
        }

        .jump-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        #jumpInput {
            padding: 10px;
            font-size: 1.1em;
            text-align: center;
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(77, 150, 255, 0.3);
            border-radius: 14px;
            font-weight: bold;
            outline: none;
            color: white;
        }

        #jumpInput:focus {
            border-color: rgba(255, 107, 107, 0.6);
            box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.1);
        }

        #jumpInput:disabled {
            opacity: 0.3;
            background: rgba(0, 0, 0, 0.2);
        }

        /* Main buttons */
        button {
            width: 100%;
            padding: 16px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.3em;
            font-weight: bold;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        button::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s;
        }

        button:hover:not(:disabled)::after {
            left: 100%;
        }

        button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none !important;
        }

        .start-btn {
            background: linear-gradient(135deg, #6BCB77 0%, #4D96FF 100%);
            color: white;
        }

        .start-btn:hover:not(:disabled) {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 12px 35px rgba(107, 203, 119, 0.4);
        }

        .start-btn:active:not(:disabled) {
            transform: scale(0.97);
        }

        .repeat-btn {
            background: linear-gradient(135deg, #9B59B6 0%, #E74C3C 100%);
            color: white;
        }

        .repeat-btn:hover:not(:disabled) {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 12px 35px rgba(155, 89, 182, 0.4);
        }

        .repeat-btn:active:not(:disabled) {
            transform: scale(0.97);
        }

        .reset-btn {
            background: linear-gradient(135deg, #FFD93D 0%, #FFA726 100%);
            color: #333;
        }

        .reset-btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 12px 35px rgba(255, 217, 61, 0.4);
        }

        .reset-btn:active {
            transform: scale(0.97);
        }

        /* Settings */
        .settings {
            background: rgba(255, 255, 255, 0.05);
            padding: 18px;
            border-radius: 20px;
            border: 2px solid rgba(77, 150, 255, 0.2);
        }

        .setting-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .setting-label {
            font-weight: bold;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1em;
        }

        select {
            padding: 11px 14px;
            border-radius: 14px;
            border: 2px solid rgba(255, 217, 61, 0.4);
            font-size: 1em;
            cursor: pointer;
            outline: none;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.15);
            transition: all 0.3s;
        }

        select:focus {
            border-color: rgba(255, 107, 107, 0.7);
            box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.15);
        }

        /* Message */
        .message {
            text-align: center;
            font-family: 'Fredoka One', cursive;
            font-size: 2em;
            color: rgba(255, 255, 255, 0.5);
            min-height: 50px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .message.success {
            color: #6BCB77;
            animation: celebrateMsg 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-shadow: 0 0 20px rgba(107, 203, 119, 0.5);
        }

        .message.error {
            color: #FF6B6B;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        @keyframes celebrateMsg {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Progress bar */
        .progress-container {
            grid-column: 1 / -1;
            height: 14px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #FF6B6B, #FFD93D, #6BCB77, #4D96FF);
            background-size: 300% 100%;
            border-radius: 10px;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: progressRainbow 3s linear infinite;
            width: 0%;
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            width: 30px;
            height: 100%;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            filter: blur(4px);
        }

        @keyframes progressRainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        /* Combo popup */
        .combo-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-family: 'Fredoka One', cursive;
            font-size: 4em;
            z-index: 200;
            pointer-events: none;
            opacity: 0;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
        }

        .combo-popup.show {
            animation: comboPopup 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes comboPopup {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-15deg); opacity: 0; }
            30% { transform: translate(-50%, -50%) scale(1.4) rotate(5deg); opacity: 1; }
            60% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -80%) scale(0.8); opacity: 0; }
        }

        /* Floating score popup */
        .score-float {
            position: fixed;
            pointer-events: none;
            font-family: 'Fredoka One', cursive;
            font-size: 2em;
            color: #6BCB77;
            z-index: 150;
            animation: scoreFloat 1.2s ease-out forwards;
            text-shadow: 0 0 10px rgba(107, 203, 119, 0.5);
        }

        @keyframes scoreFloat {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-80px) scale(1.5); opacity: 0; }
        }

        /* Screen flash on correct */
        .screen-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 90;
            animation: screenFlash 0.4s ease-out forwards;
        }

        @keyframes screenFlash {
            0% { background: rgba(107, 203, 119, 0.2); }
            100% { background: transparent; }
        }

        .screen-flash.error {
            animation: screenFlashError 0.3s ease-out forwards;
        }

        @keyframes screenFlashError {
            0% { background: rgba(255, 107, 107, 0.15); }
            100% { background: transparent; }
        }

        /* Trophy animation for game complete */
        .trophy-celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            pointer-events: none;
            animation: trophyIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .trophy-celebration .trophy-icon {
            font-size: 8em;
            animation: trophySpin 2s ease-in-out infinite;
        }

        .trophy-celebration .trophy-text {
            font-family: 'Fredoka One', cursive;
            font-size: 3em;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-top: 20px;
        }

        @keyframes trophyIn {
            0% { opacity: 0; transform: scale(0.3); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes trophySpin {
            0%, 100% { transform: rotateY(0deg) scale(1); }
            25% { transform: rotateY(15deg) scale(1.1); }
            75% { transform: rotateY(-15deg) scale(1.1); }
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <canvas id="particleCanvas"></canvas>

    <div class="container">
        <h1>🔢 Number Typing Game! 🎉</h1>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="left-panel">
            <div class="number-display" id="numberDisplay">
                <div class="animal-display" id="animalDisplay"></div>
                <div class="target-number" id="targetNumber">Ready?</div>
                <div class="animal-name" id="animalName"></div>
            </div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type number" disabled inputmode="numeric" autocomplete="off">
            </div>

            <div class="message" id="message"></div>
        </div>

        <div class="right-panel">
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">📊 Progress</div>
                    <div class="stat-value" id="score">0/32</div>
                </div>
                <div class="stat-box streak-box" id="streakBox">
                    <div class="stat-label">🔥 Streak</div>
                    <div class="stat-value" id="streakDisplay">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">🎮 Mode</div>
                    <div class="stat-value" id="modeDisplay" style="font-size:1.2em;">Sequential</div>
                </div>
            </div>

            <div class="controls">
                <button class="start-btn" id="startBtn">🚀 START! 🚀</button>
                <button class="repeat-btn" id="repeatBtn" disabled>🔊 LISTEN AGAIN 🔊</button>
                <button class="reset-btn" id="resetBtn">🔄 NEW GAME 🔄</button>
            </div>

            <div class="jump-controls">
                <div class="jump-label" id="jumpLabel">Jump to Index:</div>
                <div class="jump-buttons">
                    <button class="jump-btn" id="prevBtn" disabled>⬅️ Previous</button>
                    <input type="number" id="jumpInput" min="0" max="31" placeholder="Enter index (0-31)" disabled>
                    <button class="jump-btn" id="jumpBtn" disabled>Jump ➡️</button>
                    <button class="jump-btn" id="nextBtn" disabled>Next ➡️</button>
                </div>
            </div>

            <div class="settings">
                <div class="setting-row">
                    <span class="setting-label">🎯 Mode:</span>
                    <select id="modeSelect">
                        <option value="0-100">Count Up: 0 to 100</option>
                        <option value="101-200">Count Up: 101 to 200</option>
                        <option value="100-0">Count Down: 100 to 0</option>
                        <option value="200-101">Count Down: 200 to 101</option>
                        <option value="3-digit-sequence" selected>Sequential: 012, 123...10, 111213...899091</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // ANIMATED BACKGROUND — cosmic starfield + nebula
        // ============================================

        function resizeBg() {

        // Stars
        const stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                r: Math.random() * 2 + 0.5,
                speed: Math.random() * 0.5 + 0.1,

            });

        // Floating color blobs (nebula effect)
        const blobs = [];
        for (let i = 0; i < 5; i++) {
            blobs.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                r: Math.random() * 200 + 150,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                hue: Math.random() * 360,
                hueSpeed: Math.random() * 0.3 + 0.1
            });
        }

        function drawBg() {
            bgCtx.fillStyle = '#0a0a2e';
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

            // Nebula blobs
            for (const blob of blobs) {
                blob.x += blob.vx;
                blob.y += blob.vy;
                blob.hue += blob.hueSpeed;
                if (blob.x < -blob.r) blob.x = bgCanvas.width + blob.r;
                if (blob.x > bgCanvas.width + blob.r) blob.x = -blob.r;
                if (blob.y < -blob.r) blob.y = bgCanvas.height + blob.r;
                if (blob.y > bgCanvas.height + blob.r) blob.y = -blob.r;

                const gradient = bgCtx.createRadialGradient(blob.x, blob.y, 0, blob.x, blob.y, blob.r);
                gradient.addColorStop(0, `hsla(${blob.hue % 360}, 80%, 50%, 0.08)`);
                gradient.addColorStop(1, 'transparent');
                bgCtx.fillStyle = gradient;
                bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
            }

            // Stars
            for (const star of stars) {
                star.twinkle += star.twinkleSpeed;
                star.y += star.speed;
                if (star.y > bgCanvas.height + 5) {
                    star.y = -5;
                    star.x = Math.random() * bgCanvas.width;
                }
                const alpha = 0.4 + Math.sin(star.twinkle) * 0.4;
                bgCtx.beginPath();
                bgCtx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
                bgCtx.fillStyle = `hsla(${star.hue}, 80%, 85%, ${alpha})`;
                bgCtx.fill();
            }

            requestAnimationFrame(drawBg);
        }
        drawBg();

        // ============================================
        // PARTICLE SYSTEM for celebrations
        // ============================================
        const particleCanvas = document.getElementById('particleCanvas');
        const pCtx = particleCanvas.getContext('2d');

        function resizeParticles() {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
        }
        resizeParticles();
        window.addEventListener('resize', resizeParticles);

        const particles = [];

        class Particle {
            constructor(x, y, type = 'confetti') {
                this.x = x;
                this.y = y;
                this.type = type;
                if (type === 'confetti') {
                    this.vx = (Math.random() - 0.5) * 12;
                    this.vy = Math.random() * -16 - 4;
                    this.gravity = 0.35;
                    this.rotation = Math.random() * 360;
                    this.rotationSpeed = (Math.random() - 0.5) * 15;
                    this.size = Math.random() * 10 + 5;
                    this.color = `hsl(${Math.random() * 360}, 90%, 60%)`;
                    this.life = 1;
                    this.decay = Math.random() * 0.015 + 0.008;
                    this.shape = Math.floor(Math.random() * 3); // 0=rect, 1=circle, 2=star
                } else if (type === 'sparkle') {
                    this.vx = (Math.random() - 0.5) * 6;
                    this.vy = (Math.random() - 0.5) * 6;
                    this.size = Math.random() * 4 + 2;
                    this.color = `hsl(${Math.random() * 60 + 30}, 100%, 70%)`;
                    this.life = 1;
                    this.decay = Math.random() * 0.03 + 0.02;
                    this.gravity = 0;
                    this.rotation = 0;
                    this.rotationSpeed = 0;
                } else if (type === 'firework') {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 8 + 3;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.gravity = 0.1;
                    this.size = Math.random() * 4 + 2;
                    this.color = `hsl(${Math.random() * 360}, 100%, 65%)`;
                    this.life = 1;
                    this.decay = Math.random() * 0.02 + 0.01;
                    this.rotation = 0;
                    this.rotationSpeed = 0;
                    this.trail = [];
                }
            }

            update() {
                if (this.type === 'firework') {
                    this.trail.push({ x: this.x, y: this.y, life: 0.5 });
                    if (this.trail.length > 8) this.trail.shift();
                    this.trail.forEach(t => t.life -= 0.06);
                }
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity || 0;
                this.rotation += this.rotationSpeed || 0;
                this.life -= this.decay;
                this.vx *= 0.99;
                return this.life > 0;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.translate(this.x, this.y);

                if (this.type === 'firework') {
                    // Draw trail
                    for (const t of this.trail) {
                        if (t.life > 0) {
                            ctx.globalAlpha = t.life * this.life;
                            ctx.beginPath();
                            ctx.arc(t.x - this.x, t.y - this.y, this.size * 0.5, 0, Math.PI * 2);
                            ctx.fillStyle = this.color;
                            ctx.fill();
                        }
                    }
                    ctx.globalAlpha = this.life;
                }

                ctx.rotate((this.rotation * Math.PI) / 180);

                if (this.type === 'confetti') {
                    ctx.fillStyle = this.color;
                    if (this.shape === 0) {
                        ctx.fillRect(-this.size / 2, -this.size / 4, this.size, this.size / 2);
                    } else if (this.shape === 1) {
                        ctx.beginPath();
                        ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        // small star
                        ctx.beginPath();
                        for (let i = 0; i < 5; i++) {
                            const a = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                            const r = i === 0 ? this.size / 2 : this.size / 2;
                            ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
                            const a2 = a + (2 * Math.PI) / 10;
                            ctx.lineTo(Math.cos(a2) * r * 0.4, Math.sin(a2) * r * 0.4);
                        }
                        ctx.closePath();
                        ctx.fill();
                    }
                } else if (this.type === 'sparkle') {
                    ctx.fillStyle = this.color;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = this.color;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else if (this.type === 'firework') {
                    ctx.fillStyle = this.color;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = this.color;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                ctx.restore();
            }
        }

        function emitConfetti(x, y, count = 30) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, 'confetti'));
            }

        function emitSparkles(x, y, count = 15) {

        function emitFireworks(count = 3) {
            for (let i = 0; i < count; i++) {
                const x = Math.random() * window.innerWidth * 0.6 + window.innerWidth * 0.2;
                const y = Math.random() * window.innerHeight * 0.4 + window.innerHeight * 0.1;
                for (let j = 0; j < 40; j++) {
                    particles.push(new Particle(x, y, 'firework'));
                }
            }
        }

        function animateParticles() {
            pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                if (!particles[i].update()) {
                    particles.splice(i, 1);
                } else {
                    particles[i].draw(pCtx);
                }
            }
            requestAnimationFrame(animateParticles);
        }

        // ============================================
        // TEXT TO SPEECH
        // ============================================
        function speak(text, rate = 0.8) {
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                setTimeout(() => speakNow(text, rate), 100);
            } else {
                speakNow(text, rate);
            }
        }

        function speakNow(text, rate) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = rate;
            utterance.pitch = 1.1;
            utterance.volume = 1.0;
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v =>
                v.lang.startsWith('en') &&
                (v.name.includes('Female') || v.name.includes('Samantha') || v.name.includes('Karen'))
            );
            if (preferredVoice) utterance.voice = preferredVoice;
            window.speechSynthesis.speak(utterance);
        }

        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

        function selectRandomAnimal() {
            const randomIndex = Math.floor(Math.random() * animalTemplates.length);
            const animal = { ...animalTemplates[randomIndex] };
            animal.number = gameState.isSequentialMode
                ? sequential3DigitNumbers[gameState.currentNumber]
                : gameState.currentNumber.toString();
            return animal;
        }

        function speakNumber(numberText, animalName) {
            if (gameState.isSequentialMode) {
                if (numberText === '10') {
                    speak(`${numberText} for ${animalName}`, 0.8);
                } else if (numberText.length === 6) {
                    const first = numberText.substring(0, 2);
                    const second = numberText.substring(2, 4);
                    const third = numberText.substring(4, 6);
                    speak(`${first}, ${second}, ${third} for ${animalName}`, 0.8);
                } else {
                    const digits = numberText.split('').join(', ');
                    speak(`${digits} for ${animalName}`, 0.8);
                }
            } else {
                speak(`${numberText} for ${animalName}`, 0.8);
            }
        }

            gameState.currentAnimal = selectRandomAnimal();
            const count = parseInt(gameState.currentAnimal.number);

            if (gameState.isSequentialMode) {
                completed = gameState.currentNumber;
                total = sequential3DigitNumbers.length;
            } else if (gameState.isCountdown) {
                completed = gameState.startNumber - gameState.currentNumber;
                total = gameState.startNumber - gameState.endNumber + 1;
            } else {
                completed = gameState.currentNumber - gameState.startNumber;
                total = gameState.endNumber - gameState.startNumber + 1;
            }
            scoreEl.textContent = `${completed}/${total}`;
            modeDisplayEl.textContent = gameState.isSequentialMode ? 'Sequential' : gameState.mode;

        function resetGame() {
            gameState.isPlaying = false;
            gameState.score = 0;
            gameState.streak = 0;
            gameState.mode = modeSelect.value;

            if (gameState.mode === '0-100') {
                gameState.startNumber = 0; gameState.endNumber = 100;
                gameState.isCountdown = false; gameState.isSequentialMode = false;
            } else if (gameState.mode === '101-200') {
                gameState.startNumber = 101; gameState.endNumber = 200;
                gameState.isCountdown = false; gameState.isSequentialMode = false;
            } else if (gameState.mode === '100-0') {
                gameState.startNumber = 100; gameState.endNumber = 0;
                gameState.isCountdown = true; gameState.isSequentialMode = false;
            } else if (gameState.mode === '200-101') {
                gameState.startNumber = 200; gameState.endNumber = 101;
                gameState.isCountdown = true; gameState.isSequentialMode = false;
            } else if (gameState.mode === '3-digit-sequence') {
                gameState.startNumber = 0; gameState.endNumber = sequential3DigitNumbers.length - 1;
                gameState.isCountdown = false; gameState.isSequentialMode = true;
            }
            gameState.currentNumber = gameState.startNumber;

            userInputEl.disabled = true;
            userInputEl.value = '';
            userInputEl.className = '';
            startBtn.disabled = false;
            repeatBtn.disabled = true;
            modeSelect.disabled = false;
            jumpInput.disabled = true;
            jumpInput.value = '';
            jumpBtn.disabled = true;
            prevBtn.disabled = true;
            nextBtn.disabled = true;

            targetNumberEl.textContent = 'Ready?';
            targetNumberEl.classList.remove('number-enter');
            animalDisplayEl.textContent = '';
            animalNameEl.textContent = '';
            messageEl.textContent = '';
            messageEl.className = 'message';
            progressBar.style.width = '0%';

            updateStats();
        }

        function checkInput() {
            if (!gameState.isPlaying || !gameState.currentAnimal) return;

            const userValue = userInputEl.value.trim();
            const targetNumber = gameState.currentAnimal.number;

            if (userValue === targetNumber) {
                gameState.score++;
                gameState.streak++;
                if (gameState.streak > gameState.bestStreak) gameState.bestStreak = gameState.streak;

                if (gameState.isSequentialMode) gameState.currentNumber++;
                else if (gameState.isCountdown) gameState.currentNumber--;
                else gameState.currentNumber++;

                userInputEl.className = 'correct';
                showCelebration();

                let isComplete;
                if (gameState.isSequentialMode) isComplete = gameState.currentNumber > gameState.endNumber;
                else if (gameState.isCountdown) isComplete = gameState.currentNumber < gameState.endNumber;
                else isComplete = gameState.currentNumber > gameState.endNumber;

                if (isComplete) {
                    setTimeout(() => endGameComplete(), 1500);
                } else {
                    setTimeout(() => {
                        if (gameState.isPlaying) { setNewAnimal(); updateStats(); }
                    }, 1500);
                }
            } else if (userValue.length > 0) {
                const isComplete = userValue.length >= targetNumber.length;
                if (isComplete) {
                    gameState.streak = 0;
                    updateStats();
                    userInputEl.className = 'incorrect';
                    messageEl.textContent = 'Oops! Try Again! 💪';
                    messageEl.className = 'message error';
                    speak('Try again!', 1.0);
                    showScreenFlash(true);

                    setTimeout(() => {
                        userInputEl.value = '';
                        userInputEl.className = '';
                        if (gameState.isPlaying) messageEl.textContent = 'Type the number!';
                    }, 1000);
                }
            }
        }

        function jumpToNumber(targetNum) {
            if (!gameState.isPlaying) return;
            if (gameState.isSequentialMode) {
                targetNum = Math.max(gameState.startNumber, Math.min(gameState.endNumber, targetNum));
            } else if (gameState.isCountdown) {
                targetNum = Math.min(gameState.startNumber, Math.max(gameState.endNumber, targetNum));
            } else {
                targetNum = Math.max(gameState.startNumber, Math.min(gameState.endNumber, targetNum));
            }
            gameState.currentNumber = targetNum;
            setNewAnimal();
            updateStats();
            userInputEl.focus();
        }

        function handleJump() {
            const targetNum = parseInt(jumpInput.value);
            const minNum = Math.min(gameState.startNumber, gameState.endNumber);
            const maxNum = Math.max(gameState.startNumber, gameState.endNumber);
            if (!isNaN(targetNum) && targetNum >= minNum && targetNum <= maxNum) {
                jumpToNumber(targetNum);
                jumpInput.value = '';
            }
        }

        function handlePrevious() {
            if (gameState.isSequentialMode) {
                if (gameState.currentNumber > gameState.startNumber) jumpToNumber(gameState.currentNumber - 1);
            } else if (gameState.isCountdown) {
                if (gameState.currentNumber < gameState.startNumber) jumpToNumber(gameState.currentNumber + 1);
            } else {
                if (gameState.currentNumber > gameState.startNumber) jumpToNumber(gameState.currentNumber - 1);
            }
        }

        function handleNext() {
            if (gameState.isSequentialMode) {
                if (gameState.currentNumber < gameState.endNumber) jumpToNumber(gameState.currentNumber + 1);
            } else if (gameState.isCountdown) {
                if (gameState.currentNumber > gameState.endNumber) jumpToNumber(gameState.currentNumber - 1);
            } else {
                if (gameState.currentNumber < gameState.endNumber) jumpToNumber(gameState.currentNumber + 1);
            }
        }

        function updateJumpInputRange() {
            const mode = modeSelect.value;
            if (mode === '0-100' || mode === '100-0') {
                jumpInput.min = '0'; jumpInput.max = '100';
                jumpInput.placeholder = 'Enter number'; jumpLabel.textContent = 'Jump to Number:';
            } else if (mode === '101-200' || mode === '200-101') {
                jumpInput.min = '101'; jumpInput.max = '200';
                jumpInput.placeholder = 'Enter number'; jumpLabel.textContent = 'Jump to Number:';
            } else if (mode === '3-digit-sequence') {
                jumpInput.min = '0'; jumpInput.max = (sequential3DigitNumbers.length - 1).toString();
                jumpInput.placeholder = 'Enter index (0-' + (sequential3DigitNumbers.length - 1) + ')';
                jumpLabel.textContent = 'Jump to Index:';
            }
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        startBtn.addEventListener('click', startGame);
        repeatBtn.addEventListener('click', repeatCurrentAnimal);
        resetBtn.addEventListener('click', resetGame);
        jumpBtn.addEventListener('click', handleJump);
        prevBtn.addEventListener('click', handlePrevious);
        nextBtn.addEventListener('click', handleNext);

        modeSelect.addEventListener('change', () => {
            updateJumpInputRange();
            resetGame();
        });

        jumpInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleJump();
        });

        userInputEl.addEventListener('keypress', (e) => {
            if (!/[0-9]/.test(e.key) && e.key !== 'Enter' && e.key !== 'Backspace') {
                e.preventDefault();
            }
        });

        userInputEl.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
            const maxLength = gameState.isSequentialMode ? 6 : 3;
            if (e.target.value.length > maxLength) {
                e.target.value = e.target.value.slice(0, maxLength);
            }
            if (!gameState.isSequentialMode) {
                const numValue = parseInt(e.target.value);
                if (numValue > 200) e.target.value = '200';
            }
            checkInput();
        });

        // Initialize
        updateJumpInputRange();
        updateStats();
    </script>
</body>
</html>
