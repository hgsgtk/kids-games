<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌈 Rainbow Number Adventure 🚀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', cursive, sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            filter: brightness(1.1) saturate(1.2);
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .hud-item {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 240, 245, 0.95) 100%);
            padding: 15px 25px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3), 0 0 20px rgba(255, 107, 157, 0.4);
            font-weight: bold;
            font-size: 1.4rem;
            color: #ff6b9d;
            border: 3px solid rgba(255, 255, 255, 0.8);
            animation: hudPulse 3s ease-in-out infinite;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.5);
        }

        @keyframes hudPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3), 0 0 20px rgba(255, 107, 157, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 8px 35px rgba(0, 0, 0, 0.4), 0 0 30px rgba(255, 107, 157, 0.6); }
        }

        .mascot {
            position: absolute;
            bottom: 30px;
            left: 30px;
            font-size: 6rem;
            animation: mascotBounce 2s ease-in-out infinite;
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.3));
            cursor: pointer;
            pointer-events: all;
            transition: transform 0.2s;
        }

        .mascot:hover {
            transform: scale(1.2) rotate(10deg);
        }

        @keyframes mascotBounce {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            25% { transform: translateY(-20px) rotate(5deg); }
            50% { transform: translateY(0) rotate(-5deg); }
            75% { transform: translateY(-10px) rotate(5deg); }
        }

        .speech-bubble {
            position: absolute;
            bottom: 140px;
            left: 150px;
            background: white;
            padding: 15px 25px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            font-size: 1.3rem;
            font-weight: bold;
            color: #667eea;
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .speech-bubble.show {
            opacity: 1;
            transform: scale(1);
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 30px;
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 15px solid white;
        }

        .input-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(255, 240, 245, 0.98) 100%);
            padding: 40px 60px;
            border-radius: 40px;
            box-shadow: 0 15px 60px rgba(0, 0, 0, 0.4), 0 0 40px rgba(255, 107, 157, 0.6);
            font-size: clamp(4rem, 10vw, 7rem);
            font-weight: bold;
            color: #ff6b9d;
            min-width: 2.6em;
            text-align: center;
            display: none;
            z-index: 500;
            border: 5px solid white;
            animation: pulseInput 0.3s ease-out;
            font-family: 'Comic Sans MS', cursive;
            text-shadow: 3px 3px 6px rgba(255, 107, 157, 0.3);
        }

        @keyframes pulseInput {
            0% { transform: translate(-50%, -50%) scale(0.5) rotate(-5deg); }
            50% { transform: translate(-50%, -50%) scale(1.1) rotate(2deg); }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
        }

        .input-display.show {
            display: block;
        }

        .input-display.correct {
            color: #4CAF50;
            border-color: #4CAF50;
            background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 50%, #A5D6A7 100%);
            animation: correctBounce 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 15px 60px rgba(76, 175, 80, 0.6), 0 0 60px rgba(76, 175, 80, 0.8);
        }

        @keyframes correctBounce {
            0% { transform: translate(-50%, -50%) scale(0.3) rotate(-180deg); }
            60% { transform: translate(-50%, -50%) scale(1.3) rotate(10deg); }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
        }

        .input-display.wrong {
            color: #ff6b9d;
            border-color: #ff6b9d;
            background: linear-gradient(135deg, #FFEBEE 0%, #FFCDD2 50%, #EF9A9A 100%);
            animation: wrongShake 0.5s;
            box-shadow: 0 15px 60px rgba(255, 107, 157, 0.6), 0 0 60px rgba(255, 107, 157, 0.8);
        }

        @keyframes wrongShake {
            0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-48%, -50%) rotate(-3deg); }
            20%, 40%, 60%, 80% { transform: translate(-52%, -50%) rotate(3deg); }
        }

        .controls-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: all;
        }

        .control-btn {
            padding: 15px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 200% 200%;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            font-family: inherit;
            animation: buttonGradient 3s ease infinite;
        }

        @keyframes buttonGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .control-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.6);
        }

        .control-btn:active {
            transform: translateY(-2px) scale(1.02);
        }

        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            pointer-events: all;
        }

        .start-screen.hidden {
            display: none;
        }

        .start-screen h1 {
            color: white;
            font-size: 4.5rem;
            margin-bottom: 30px;
            text-shadow: 5px 5px 15px rgba(0, 0, 0, 0.4);
            animation: titleBounce 2s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.5));
        }

        @keyframes titleBounce {
            0%, 100% { transform: scale(1) rotate(-2deg); }
            50% { transform: scale(1.08) rotate(2deg); }
        }

        .mode-selector {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 240, 245, 0.95) 100%);
            padding: 40px;
            border-radius: 30px;
            margin-bottom: 30px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
            border: 4px solid white;
        }

        .mode-selector label {
            font-size: 1.8rem;
            font-weight: bold;
            color: #667eea;
            display: block;
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.5);
        }

        .mode-selector select {
            width: 100%;
            padding: 18px;
            font-size: 1.4rem;
            font-weight: bold;
            border: 4px solid #667eea;
            border-radius: 20px;
            cursor: pointer;
            outline: none;
            font-family: inherit;
            background: white;
            transition: all 0.3s;
        }

        .mode-selector select:hover {
            border-color: #ff6b9d;
            transform: scale(1.02);
        }

        .start-btn {
            padding: 25px 70px;
            font-size: 2.3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ff6b9d 0%, #ffa06b 50%, #ffd93d 100%);
            background-size: 200% 200%;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 12px 40px rgba(255, 107, 157, 0.5);
            font-family: inherit;
            animation: buttonGradient 3s ease infinite;
            border: 4px solid white;
        }

        .start-btn:hover {
            transform: translateY(-8px) scale(1.08);
            box-shadow: 0 20px 60px rgba(255, 107, 157, 0.7);
        }

        .start-btn:active {
            transform: translateY(-4px) scale(1.04);
        }

        .message {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 30px rgba(0, 0, 0, 0.8), 0 0 60px rgba(255, 107, 157, 0.8);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.5));
            z-index: 600;
        }

        .message.show {
            opacity: 1;
            animation: messagePopIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes messagePopIn {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-180deg); }
            60% { transform: translate(-50%, -50%) scale(1.2) rotate(10deg); }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
        }

        .complete-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(255, 240, 245, 0.98) 100%);
            padding: 70px;
            border-radius: 40px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
            text-align: center;
            pointer-events: all;
            z-index: 300;
            border: 6px solid white;
        }

        .complete-screen.hidden {
            display: none;
        }

        .complete-screen h2 {
            font-size: 4rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            animation: titleBounce 2s ease-in-out infinite;
        }

        .complete-screen p {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 30px;
        }

        .emoji-large {
            font-size: 8rem;
            margin: 20px 0;
            animation: emojiSpin 3s ease-in-out infinite;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
        }

        @keyframes emojiSpin {
            0%, 100% { transform: rotate(-15deg) scale(1); }
            25% { transform: rotate(15deg) scale(1.2); }
            50% { transform: rotate(-15deg) scale(1); }
            75% { transform: rotate(15deg) scale(1.1); }
        }

        .hint-text {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1.4rem;
            text-shadow: 0 3px 8px rgba(0, 0, 0, 0.6);
            opacity: 0.9;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 30px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f0f;
            position: absolute;
            animation: confettiFall 3s linear infinite;
        }

        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui-overlay">
        <!-- HUD -->
        <div class="hud">
            <div class="hud-item">
                🌟 Progress: <span id="progress">0/101</span>
            </div>
            <div class="hud-item" id="targetHud" style="cursor: pointer; pointer-events: all;" title="Click to hear again">
                🎯 Number: <span id="targetNumber">0</span> 🔊
            </div>
            <div class="hud-item">
                🎮 Mode: <span id="modeDisplay">0-100</span>
            </div>
        </div>

        <!-- Mascot -->
        <div class="mascot" id="mascot">🦄</div>
        <div class="speech-bubble" id="speechBubble">You can do it!</div>

        <!-- Controls -->
        <div class="controls-panel">
            <button class="control-btn" id="prevBtn">⬅️ Prev</button>
            <button class="control-btn" id="nextBtn">Next ➡️</button>
            <button class="control-btn" id="resetBtn">🔄 Reset</button>
        </div>

        <!-- Message -->
        <div class="message" id="message"></div>

        <!-- Hint -->
        <div class="hint-text">
            ✨ Use ← → arrows to navigate | Type the number! ✨
        </div>
    </div>

    <!-- Input Display Overlay -->
    <div class="input-display" id="inputDisplay"></div>

    <!-- Start Screen -->
    <div class="start-screen" id="startScreen">
        <h1>🌈 Rainbow Number Adventure 🚀</h1>
        <div class="mode-selector">
            <label for="modeSelect">Choose Your Adventure:</label>
            <select id="modeSelect">
                <option value="0-100" selected>✨ Numbers 0 to 100 ✨</option>
                <option value="101-200">🚀 Numbers 101 to 200 🚀</option>
            </select>
        </div>
        <button class="start-btn" onclick="startGame()">🎮 Let's Go!</button>
    </div>

    <!-- Complete Screen -->
    <div class="complete-screen hidden" id="completeScreen">
        <div class="emoji-large">🏆</div>
        <h2>🎉 Amazing! You're a Star! 🎉</h2>
        <p>You mastered all the numbers!</p>
        <p id="completionStats"></p>
        <button class="start-btn" onclick="restartGame()">🎮 Play Again!</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game state
        let gameState = {
            isPlaying: false,
            currentNumber: 0,
            mode: '0-100',
            startNumber: 0,
            endNumber: 100
        };

        // Audio
        const numberAudioCache = {};
        let currentAudio = null;
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        // Sound effects using Web Audio API
        function playCorrectSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 523.25; // C5
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
            
            // Second note
            setTimeout(() => {
                const osc2 = audioContext.createOscillator();
                const gain2 = audioContext.createGain();
                osc2.connect(gain2);
                gain2.connect(audioContext.destination);
                osc2.frequency.value = 659.25; // E5
                osc2.type = 'sine';
                gain2.gain.setValueAtTime(0.3, audioContext.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                osc2.start(audioContext.currentTime);
                osc2.stop(audioContext.currentTime + 0.5);
            }, 100);
        }

        function playWrongSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 200;
            oscillator.type = 'sawtooth';
            
            gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        function playClickSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
        }

        function preloadAudio(number) {
            if (numberAudioCache[number]) return;
            const audio = new Audio(`../assets/audio/numbers/${number}.mp3`);
            audio.preload = 'auto';
            numberAudioCache[number] = audio;
        }

        function playNumberAudio(number) {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            if (!numberAudioCache[number]) {
                preloadAudio(number);
            }
            const audio = numberAudioCache[number];
            audio.currentTime = 0;
            audio.play().catch(() => {});
            currentAudio = audio;
        }

        function preloadRange(start, count) {
            for (let i = start; i < Math.min(start + count, 201); i++) {
                preloadAudio(i);
            }
        }

        // Three.js variables
        let scene, camera, renderer;
        let currentNumberMesh;
        let particles = [];
        let rainbowParticles = [];
        let collectibles = [];

        // Input state
        let currentInput = '';
        let remainingDigits = [];
        let inputTimeout = null;

        // DOM elements
        const progressEl = document.getElementById('progress');
        const targetNumberEl = document.getElementById('targetNumber');
        const modeDisplayEl = document.getElementById('modeDisplay');
        const inputDisplay = document.getElementById('inputDisplay');
        const messageEl = document.getElementById('message');
        const startScreen = document.getElementById('startScreen');
        const completeScreen = document.getElementById('completeScreen');
        const modeSelect = document.getElementById('modeSelect');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const resetBtn = document.getElementById('resetBtn');
        const mascotEl = document.getElementById('mascot');
        const speechBubble = document.getElementById('speechBubble');

        // Mascot messages
        const encouragementMessages = [
            "You're doing great! 🌟",
            "Keep going! 💪",
            "Awesome! 🎉",
            "You rock! 🎸",
            "Brilliant! ✨",
            "Amazing! 🌈",
            "Fantastic! 🎊",
            "Super! 🦸"
        ];

        // Initialize Three.js scene
        function initThreeJS() {
            const canvas = document.getElementById('gameCanvas');
            
            // Scene
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x667eea, 10, 120);

            // Camera
            camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(0, 5, 18);
            camera.lookAt(0, 0, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const pointLight1 = new THREE.PointLight(0xff6b9d, 2, 100);
            pointLight1.position.set(-10, 10, 10);
            scene.add(pointLight1);

            const pointLight2 = new THREE.PointLight(0x667eea, 2, 100);
            pointLight2.position.set(10, 10, 10);
            scene.add(pointLight2);

            const pointLight3 = new THREE.PointLight(0xffd93d, 1.5, 80);
            pointLight3.position.set(0, -10, 5);
            scene.add(pointLight3);

            // Create rainbow particles
            createRainbowParticles();

            // Window resize handler
            window.addEventListener('resize', onWindowResize);
        }

        // Create rainbow floating particles
        function createRainbowParticles() {
            const colors = [0xff6b9d, 0xffa06b, 0xffd93d, 0x4CAF50, 0x667eea, 0x764ba2, 0xf093fb];
            
            for (let i = 0; i < 100; i++) {
                const geometry = new THREE.SphereGeometry(0.2 + Math.random() * 0.3, 8, 8);
                const color = colors[Math.floor(Math.random() * colors.length)];
                const material = new THREE.MeshPhongMaterial({ 
                    color,
                    emissive: color,
                    emissiveIntensity: 0.5,
                    shininess: 100
                });
                const particle = new THREE.Mesh(geometry, material);
                
                particle.position.set(
                    (Math.random() - 0.5) * 50,
                    (Math.random() - 0.5) * 50,
                    (Math.random() - 0.5) * 50
                );
                
                particle.userData = {
                    velocity: {
                        x: (Math.random() - 0.5) * 0.03,
                        y: (Math.random() - 0.5) * 0.03,
                        z: (Math.random() - 0.5) * 0.03
                    },
                    rotationSpeed: {
                        x: (Math.random() - 0.5) * 0.02,
                        y: (Math.random() - 0.5) * 0.02,
                        z: (Math.random() - 0.5) * 0.02
                    }
                };
                
                scene.add(particle);
                rainbowParticles.push(particle);
            }
        }

        // Create 3D text for number
        function create3DNumber(number) {
            // Remove old number if exists
            if (currentNumberMesh) {
                scene.remove(currentNumberMesh);
            }

            // Create text using canvas texture
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 1024;
            canvas.height = 512;
            
            // Gradient background
            const gradient = context.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#ff6b9d');
            gradient.addColorStop(0.5, '#ffa06b');
            gradient.addColorStop(1, '#ffd93d');
            
            context.fillStyle = gradient;
            context.font = 'bold 300px Arial';
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillText(number.toString(), 512, 256);
            
            // Add white outline
            context.strokeStyle = 'white';
            context.lineWidth = 15;
            context.strokeText(number.toString(), 512, 256);

            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.MeshPhongMaterial({
                map: texture,
                transparent: true,
                emissive: 0xffffff,
                emissiveIntensity: 0.4,
                shininess: 100
            });

            const geometry = new THREE.PlaneGeometry(12, 6);
            currentNumberMesh = new THREE.Mesh(geometry, material);
            currentNumberMesh.position.set(0, 3, 0);
            
            scene.add(currentNumberMesh);

            // Create collectible gems
            createCollectibles(number);
        }

        // Create collectible gems representing the number
        function createCollectibles(count) {
            // Clear existing collectibles
            collectibles.forEach(obj => scene.remove(obj));
            collectibles = [];

            // Limit display for large numbers
            const displayCount = Math.min(count, 25);
            const colors = [0xff6b9d, 0xffa06b, 0xffd93d, 0x4CAF50, 0x667eea];
            
            for (let i = 0; i < displayCount; i++) {
                // Create a gem shape (octahedron)
                const geometry = new THREE.OctahedronGeometry(0.4, 0);
                const color = colors[i % colors.length];
                const material = new THREE.MeshPhongMaterial({
                    color,
                    emissive: color,
                    emissiveIntensity: 0.6,
                    shininess: 100,
                    transparent: true,
                    opacity: 0.9
                });
                const gem = new THREE.Mesh(geometry, material);
                
                // Arrange in a spiral
                const angle = (i / displayCount) * Math.PI * 4;
                const radius = 6 + (i / displayCount) * 2;
                gem.position.set(
                    Math.cos(angle) * radius,
                    -2 + Math.sin(i * 0.8) * 2,
                    Math.sin(angle) * radius
                );
                
                gem.userData = { 
                    floatSpeed: Math.random() * 0.03 + 0.02,
                    rotationSpeed: (Math.random() - 0.5) * 0.1
                };
                
                scene.add(gem);
                collectibles.push(gem);
            }
        }

        // Mascot interaction
        mascotEl.addEventListener('click', () => {
            const message = encouragementMessages[Math.floor(Math.random() * encouragementMessages.length)];
            speechBubble.textContent = message;
            speechBubble.classList.add('show');
            
            setTimeout(() => {
                speechBubble.classList.remove('show');
            }, 2000);
        });

        // Start game
        function startGame() {
            gameState.isPlaying = true;
            gameState.mode = modeSelect.value;
            
            if (gameState.mode === '0-100') {
                gameState.startNumber = 0;
                gameState.endNumber = 100;
            } else {
                gameState.startNumber = 101;
                gameState.endNumber = 200;
            }
            
            gameState.currentNumber = gameState.startNumber;
            
            startScreen.classList.add('hidden');
            
            preloadRange(gameState.startNumber, 10);
            create3DNumber(gameState.currentNumber);
            playNumberAudio(gameState.currentNumber);
            resetInput();
            hideInputDisplay();
            updateUI();
            
            showMessage("Let's Go! 🚀", 2000);
            createConfetti();
        }

        // Update UI
        function updateUI() {
            const completed = gameState.currentNumber - gameState.startNumber;
            const total = gameState.endNumber - gameState.startNumber + 1;
            progressEl.textContent = `${completed}/${total}`;
            targetNumberEl.textContent = gameState.currentNumber;
            modeDisplayEl.textContent = gameState.mode === '0-100' ? '0-100' : '101-200';
        }

        // Show message
        function showMessage(text, duration = 1500) {
            messageEl.textContent = text;
            messageEl.classList.add('show');
            
            setTimeout(() => {
                messageEl.classList.remove('show');
            }, duration);
        }

        function resetInput() {
            currentInput = '';
            remainingDigits = gameState.currentNumber.toString().split('');
        }

        // Input display functions
        function showInputDisplay(text, isCorrect = null, keepVisible = false) {
            inputDisplay.textContent = text || '_';
            inputDisplay.className = 'input-display show';

            if (isCorrect === true) {
                inputDisplay.classList.add('correct');
            } else if (isCorrect === false) {
                inputDisplay.classList.add('wrong');
            }

            if (inputTimeout) {
                clearTimeout(inputTimeout);
            }

            if (keepVisible) return;

            inputTimeout = setTimeout(() => {
                inputDisplay.classList.remove('show');
            }, 2000);
        }

        function hideInputDisplay() {
            inputDisplay.classList.remove('show');
            if (inputTimeout) {
                clearTimeout(inputTimeout);
            }
        }

        // Create confetti
        function createConfetti() {
            const colors = ['#ff6b9d', '#ffa06b', '#ffd93d', '#4CAF50', '#667eea', '#f093fb'];
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    confetti.style.animationDelay = (Math.random() * 0.5) + 's';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 3000);
                }, i * 30);
            }
        }

        // Create particle explosion
        function createParticleExplosion() {
            const colors = [0xff6b9d, 0xffa06b, 0xffd93d, 0x4CAF50, 0x667eea];
            const particles = [];
            
            for (let i = 0; i < 40; i++) {
                const geometry = new THREE.SphereGeometry(0.2, 8, 8);
                const color = colors[Math.floor(Math.random() * colors.length)];
                const material = new THREE.MeshBasicMaterial({ color });
                const particle = new THREE.Mesh(geometry, material);
                
                particle.position.copy(currentNumberMesh.position);
                
                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.6,
                    (Math.random() - 0.5) * 0.6,
                    (Math.random() - 0.5) * 0.6
                );
                
                particle.userData.velocity = velocity;
                scene.add(particle);
                particles.push(particle);
            }
            
            // Animate
            let frame = 0;
            const animate = () => {
                frame++;
                particles.forEach(p => {
                    p.position.add(p.userData.velocity);
                    p.userData.velocity.y -= 0.02;
                    p.scale.multiplyScalar(0.96);
                });
                
                if (frame < 60) {
                    requestAnimationFrame(animate);
                } else {
                    particles.forEach(p => scene.remove(p));
                }
            };
            animate();
        }

        // Handle correct answer
        function handleCorrectAnswer() {
            showInputDisplay(gameState.currentNumber.toString(), true);
            showMessage('Perfect! ✨🌟✨', 1200);
            playCorrectSound();
            createParticleExplosion();
            createConfetti();

            collectibles.forEach((gem, index) => {
                setTimeout(() => {
                    animateCollect(gem);
                }, index * 40);
            });

            gameState.currentNumber++;

            setTimeout(() => {
                hideInputDisplay();

                if (gameState.currentNumber > gameState.endNumber) {
                    completeGame();
                } else {
                    create3DNumber(gameState.currentNumber);
                    playNumberAudio(gameState.currentNumber);
                    preloadRange(gameState.currentNumber + 1, 5);
                    resetInput();
                    updateUI();
                }
            }, 1500);
        }

        // Handle wrong answer
        function handleWrongAnswer(wrongText) {
            showInputDisplay(wrongText, false);
            showMessage('Oops! Try Again! 💪', 1000);
            playWrongSound();

            setTimeout(() => {
                resetInput();
                hideInputDisplay();
            }, 800);
        }

        // Animate collectible collection
        function animateCollect(gem) {
            const startPos = gem.position.clone();
            const duration = 600;
            const startTime = Date.now();
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                gem.position.y = startPos.y + progress * 15;
                gem.scale.setScalar(1 - progress + progress * 0.5);
                gem.rotation.y += 0.2;
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    scene.remove(gem);
                }
            }
            
            animate();
        }

        // Complete game
        function completeGame() {
            gameState.isPlaying = false;
            currentInput = '';
            hideInputDisplay();
            
            const rangeText = gameState.mode === '0-100' ? '0 to 100' : '101 to 200';
            document.getElementById('completionStats').textContent = 
                `✨ You mastered all numbers from ${rangeText}! ✨`;
            
            completeScreen.classList.remove('hidden');
            
            // Mega fireworks
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    createFirework();
                    createConfetti();
                }, i * 300);
            }
        }

        // Restart game
        function restartGame() {
            completeScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
            
            // Reset
            gameState.currentNumber = gameState.startNumber;
            if (currentNumberMesh) {
                scene.remove(currentNumberMesh);
            }
            collectibles.forEach(obj => scene.remove(obj));
            collectibles = [];
        }

        // Create firework
        function createFirework() {
            const colors = [0xff6b9d, 0xffa06b, 0xffd93d, 0x4CAF50, 0x667eea, 0xf093fb];
            const geometry = new THREE.SphereGeometry(0.3, 8, 8);
            const color = colors[Math.floor(Math.random() * colors.length)];
            const material = new THREE.MeshBasicMaterial({ color });
            
            const particles = [];
            for (let i = 0; i < 50; i++) {
                const particle = new THREE.Mesh(geometry, material);
                particle.position.set(
                    (Math.random() - 0.5) * 30,
                    Math.random() * 20 - 5,
                    (Math.random() - 0.5) * 30
                );
                
                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.8,
                    Math.random() * 0.8,
                    (Math.random() - 0.5) * 0.8
                );
                
                particle.userData.velocity = velocity;
                scene.add(particle);
                particles.push(particle);
            }
            
            let frame = 0;
            const animate = () => {
                frame++;
                particles.forEach(p => {
                    p.position.add(p.userData.velocity);
                    p.userData.velocity.y -= 0.02;
                    p.scale.multiplyScalar(0.95);
                });
                
                if (frame < 120) {
                    requestAnimationFrame(animate);
                } else {
                    particles.forEach(p => scene.remove(p));
                }
            };
            animate();
        }

        // Navigation functions
        function goToPrevious() {
            if (!gameState.isPlaying) return;
            if (gameState.currentNumber > gameState.startNumber) {
                playClickSound();
                gameState.currentNumber--;
                create3DNumber(gameState.currentNumber);
                playNumberAudio(gameState.currentNumber);
                resetInput();
                hideInputDisplay();
                updateUI();
            }
        }

        function goToNext() {
            if (!gameState.isPlaying) return;
            if (gameState.currentNumber < gameState.endNumber) {
                playClickSound();
                gameState.currentNumber++;
                create3DNumber(gameState.currentNumber);
                playNumberAudio(gameState.currentNumber);
                preloadRange(gameState.currentNumber + 1, 5);
                resetInput();
                hideInputDisplay();
                updateUI();
            }
        }

        function resetToStart() {
            if (!gameState.isPlaying) return;
            playClickSound();
            gameState.currentNumber = gameState.startNumber;
            create3DNumber(gameState.currentNumber);
            playNumberAudio(gameState.currentNumber);
            resetInput();
            hideInputDisplay();
            updateUI();
        }

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            const time = Date.now() * 0.001;
            
            // Rotate and animate current number
            if (currentNumberMesh) {
                currentNumberMesh.rotation.y += 0.015;
                currentNumberMesh.rotation.x = Math.sin(time * 0.5) * 0.1;
                currentNumberMesh.position.y = 3 + Math.sin(time * 2) * 0.8;
                currentNumberMesh.scale.set(
                    1 + Math.sin(time * 3) * 0.05,
                    1 + Math.cos(time * 3) * 0.05,
                    1
                );
            }
            
            // Animate rainbow particles
            rainbowParticles.forEach(particle => {
                particle.position.add(particle.userData.velocity);
                
                // Bounce off boundaries
                if (Math.abs(particle.position.x) > 25) particle.userData.velocity.x *= -1;
                if (Math.abs(particle.position.y) > 25) particle.userData.velocity.y *= -1;
                if (Math.abs(particle.position.z) > 25) particle.userData.velocity.z *= -1;
                
                particle.rotation.x += particle.userData.rotationSpeed.x;
                particle.rotation.y += particle.userData.rotationSpeed.y;
                particle.rotation.z += particle.userData.rotationSpeed.z;
            });
            
            // Animate collectible gems
            collectibles.forEach((gem, index) => {
                gem.position.y += Math.sin(time * 2 + index * 0.5) * 0.04;
                gem.rotation.y += gem.userData.rotationSpeed;
                gem.rotation.x += gem.userData.rotationSpeed * 0.5;
                
                // Pulsing scale
                const scale = 1 + Math.sin(time * 4 + index) * 0.2;
                gem.scale.set(scale, scale, scale);
            });
            
            // Dynamic camera movement
            camera.position.x = Math.sin(time * 0.3) * 3;
            camera.position.y = 5 + Math.sin(time * 0.2) * 2;
            camera.lookAt(0, 2, 0);
            
            renderer.render(scene, camera);
        }

        // Window resize
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Event listeners
        prevBtn.addEventListener('click', goToPrevious);
        nextBtn.addEventListener('click', goToNext);
        resetBtn.addEventListener('click', resetToStart);

        document.getElementById('targetHud').addEventListener('click', () => {
            if (gameState.isPlaying) {
                playNumberAudio(gameState.currentNumber);
                playClickSound();
            }
        });

        // Keyboard input
        document.addEventListener('keydown', (e) => {
            if (!gameState.isPlaying) return;

            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                goToPrevious();
                return;
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                goToNext();
                return;
            }

            if (e.key === 'Backspace') {
                if (currentInput.length > 0) {
                    const removed = currentInput[currentInput.length - 1];
                    currentInput = currentInput.slice(0, -1);
                    remainingDigits.push(removed);
                    playClickSound();
                    if (currentInput.length > 0) {
                        showInputDisplay(currentInput, null, true);
                    } else {
                        hideInputDisplay();
                    }
                }
                return;
            }

            if (e.key === 'Escape') {
                resetInput();
                hideInputDisplay();
                return;
            }

            if (e.key >= '0' && e.key <= '9') {
                const idx = remainingDigits.indexOf(e.key);

                if (idx !== -1) {
                    playClickSound();
                    remainingDigits.splice(idx, 1);
                    currentInput += e.key;
                    showInputDisplay(currentInput, null, true);

                    if (remainingDigits.length === 0) {
                        handleCorrectAnswer();
                    }
                } else {
                    handleWrongAnswer(currentInput + e.key);
                }
            }
        });

        // Initialize
        initThreeJS();
        animate();
    </script>
</body>
</html>
