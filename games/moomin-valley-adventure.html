<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏔️ ムーミン谷のぼうけん 🏔️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
            background: #1a1a2e;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        /* HUD overlay */
        .hud {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
        }
        .hud > * { pointer-events: auto; }
        .hud-left { display: flex; gap: 8px; align-items: center; }
        .hud-center { flex: 1; max-width: 300px; margin: 0 12px; }
        .hud-right { display: flex; gap: 8px; align-items: center; }
        .hud-btn {
            background: rgba(255,255,255,0.9);
            border: none;
            height: 44px;
            padding: 0 14px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            gap: 6px;
            font-family: inherit;
            font-weight: bold;
            color: #555;
        }
        .hud-btn:active { transform: scale(0.92); }
        .hud-btn kbd {
            display: inline-block;
            background: rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.15);
            border-radius: 4px;
            padding: 1px 6px;
            font-size: 11px;
            font-family: inherit;
            color: #888;
        }
        /* Progress bar */
        .progress-wrap {
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            height: 24px;
            overflow: hidden;
            position: relative;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FF6B9D);
            border-radius: 10px;
            transition: width 0.6s ease;
            width: 0%;
        }
        .progress-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
        }
        /* Mission panel */
        .mission-panel {
            position: fixed;
            bottom: 70px; left: 12px;
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 14px 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 10;
            max-width: 220px;
            font-size: 13px;
            transition: transform 0.3s, opacity 0.3s;
        }
        .mission-panel.hidden {
            transform: translateX(-120%);
            opacity: 0;
            pointer-events: none;
        }
        .mission-title {
            font-weight: bold;
            color: #2E5266;
            font-size: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .mission-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 0;
            color: #555;
        }
        .mission-item.done {
            color: #28a745;
            text-decoration: line-through;
        }
        .mission-check {
            width: 18px; height: 18px;
            border: 2px solid #ccc;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }
        .mission-item.done .mission-check {
            background: #28a745;
            border-color: #28a745;
            color: white;
        }

        /* Bottom controls bar */
        .controls-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 10px 16px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ctrl-key {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            min-width: 36px;
            height: 36px;
            padding: 0 8px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            font-family: inherit;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }
        .ctrl-key.wide { min-width: 70px; font-size: 12px; }
        .ctrl-key.active {
            background: rgba(255,215,0,0.4);
            border-color: #FFD700;
            box-shadow: 0 0 12px rgba(255,215,0,0.3);
        }
        .ctrl-label {
            color: rgba(255,255,255,0.7);
            font-size: 11px;
            font-weight: bold;
        }
        .ctrl-sep {
            width: 1px;
            height: 28px;
            background: rgba(255,255,255,0.15);
            margin: 0 4px;
        }
        .ctrl-info {
            color: rgba(255,255,255,0.9);
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            min-width: 80px;
        }
        .ctrl-info .action-hint-text {
            color: #FFD700;
            font-size: 12px;
        }

        /* Dialog */
        .dialog-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .dialog-overlay.show { display: flex; }
        .dialog {
            background: white;
            border-radius: 24px;
            padding: 36px 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: dialog-pop 0.35s cubic-bezier(0.68, -0.3, 0.265, 1.25);
        }
        @keyframes dialog-pop {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .dialog-emoji { font-size: 56px; margin-bottom: 12px; }
        .dialog h2 { color: #2E5266; font-size: 1.6rem; margin-bottom: 10px; }
        .dialog p { color: #555; font-size: 1.05rem; line-height: 1.6; margin-bottom: 20px; white-space: pre-line; }
        .dialog-btn {
            background: linear-gradient(135deg, #FF6B9D, #C06C84);
            color: white; border: none;
            padding: 14px 36px;
            border-radius: 22px;
            font-size: 1.05rem;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            box-shadow: 0 4px 16px rgba(255,107,157,0.4);
            margin: 4px;
        }
        .dialog-btn:active { transform: scale(0.95); }
        .dialog-btn.secondary {
            background: linear-gradient(135deg, #6C9BD2, #4A7FB5);
            box-shadow: 0 4px 16px rgba(74,127,181,0.4);
        }
        .dialog-key-hint {
            display: block;
            color: #aaa;
            font-size: 12px;
            margin-top: 10px;
        }
        /* Scene indicator */
        .scene-indicator {
            position: fixed;
            bottom: 64px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        .scene-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            border: 2px solid rgba(255,255,255,0.6);
            transition: all 0.3s;
        }
        .scene-dot.active {
            background: #FFD700;
            border-color: #FFA500;
            transform: scale(1.2);
        }
        /* Tutorial overlay */
        .tutorial {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            transition: opacity 0.5s;
        }
        .tutorial.fade-out { opacity: 0; pointer-events: none; }
        .tutorial-card {
            background: white;
            border-radius: 28px;
            padding: 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
        }
        .tutorial-card h1 {
            font-size: 1.5rem;
            color: #2E5266;
            margin: 16px 0 8px;
        }
        .tutorial-card .tutorial-moomin { font-size: 80px; }
        .tutorial-keys {
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .tutorial-key-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            color: #555;
        }
        .tutorial-key-row .t-key {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #f0f0f0;
            border: 2px solid #ccc;
            border-radius: 8px;
            min-width: 40px;
            height: 36px;
            padding: 0 8px;
            font-weight: bold;
            font-size: 16px;
            color: #333;
            flex-shrink: 0;
        }
        .tutorial-key-row .t-key.wide { min-width: 80px; font-size: 13px; }
        .tutorial-start-hint {
            color: #aaa;
            font-size: 13px;
            margin-top: 16px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100% { opacity: .5; } 50% { opacity: 1; } }

        /* Key flash on bottom bar */
        .ctrl-key.flash {
            background: rgba(255,215,0,0.5) !important;
            border-color: #FFD700 !important;
            transition: none;
        }

        @media (max-width: 500px) {
            .mission-panel { max-width: 180px; font-size: 12px; bottom: 65px; }
            .controls-bar { padding: 8px 10px; gap: 8px; }
            .ctrl-key { min-width: 30px; height: 30px; font-size: 14px; }
            .ctrl-key.wide { min-width: 56px; font-size: 11px; }
            .ctrl-label { font-size: 10px; }
            .ctrl-info { font-size: 11px; min-width: 60px; }
            .hud-btn { height: 38px; padding: 0 10px; font-size: 14px; }
        }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div class="hud">
    <div class="hud-left">
        <button class="hud-btn" onclick="goHome()">🏠 <kbd>Esc</kbd></button>
        <button class="hud-btn" id="soundBtn" onclick="toggleSound()">🔊 <kbd>S</kbd></button>
        <button class="hud-btn" id="missionBtn" onclick="toggleMission()">📋 <kbd>M</kbd></button>
    </div>
    <div class="hud-center">
        <div class="progress-wrap">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressText">0 / 14</div>
        </div>
    </div>
    <div class="hud-right">
        <span style="color:white;font-size:13px;text-shadow:0 1px 4px rgba(0,0,0,0.5)" id="areaLabel">ムーミン谷</span>
    </div>
</div>

<!-- Mission Panel -->
<div class="mission-panel hidden" id="missionPanel">
    <div class="mission-title">🎯 きょうのミッション</div>
    <div id="missionList"></div>
</div>

<!-- Bottom Controls Bar -->
<div class="controls-bar" id="controlsBar">
    <div class="ctrl-group">
        <div class="ctrl-key" id="kUp">↑</div>
    </div>
    <div class="ctrl-group">
        <div class="ctrl-key" id="kLeft">←</div>
        <div class="ctrl-key" id="kDown">↓</div>
        <div class="ctrl-key" id="kRight">→</div>
    </div>
    <div class="ctrl-label">いどう</div>
    <div class="ctrl-sep"></div>
    <div class="ctrl-group">
        <div class="ctrl-key wide" id="kSpace">Space</div>
    </div>
    <div class="ctrl-label" id="spaceLabel">しらべる</div>
    <div class="ctrl-sep"></div>
    <div class="ctrl-info" id="ctrlInfo">
        <span>🔍 ちかくにさがそう</span>
    </div>
</div>

<!-- Scene Indicator -->
<div class="scene-indicator">
    <div class="scene-dot active" id="dot0"></div>
    <div class="scene-dot" id="dot1"></div>
</div>

<!-- Dialog -->
<div class="dialog-overlay" id="dialogOverlay">
    <div class="dialog">
        <div class="dialog-emoji" id="dialogEmoji"></div>
        <h2 id="dialogTitle"></h2>
        <p id="dialogText"></p>
        <button class="dialog-btn" id="dialogBtn">つぎへ</button>
        <span class="dialog-key-hint" id="dialogKeyHint">Space / Enter でとじる</span>
    </div>
</div>

<!-- Tutorial -->
<div class="tutorial" id="tutorial">
    <div class="tutorial-card">
        <div class="tutorial-moomin">🏔️</div>
        <h1>ムーミン谷のぼうけん</h1>
        <div class="tutorial-keys">
            <div class="tutorial-key-row">
                <span class="t-key">↑</span><span class="t-key">↓</span><span class="t-key">←</span><span class="t-key">→</span>
                <span>ムーミンを うごかす</span>
            </div>
            <div class="tutorial-key-row">
                <span class="t-key wide">Space</span>
                <span>しらべる / はなす / ひろう</span>
            </div>
            <div class="tutorial-key-row">
                <span class="t-key">M</span>
                <span>ミッションを みる</span>
            </div>
            <div class="tutorial-key-row">
                <span class="t-key wide">Esc</span>
                <span>ホームに もどる</span>
            </div>
        </div>
        <p style="color:#888;font-size:14px;margin-top:8px">🎯 6にんのなかまと8このアイテムをあつめよう！</p>
        <button class="dialog-btn" onclick="startGame()">ぼうけんスタート！</button>
        <div class="tutorial-start-hint">▼ Space / Enter でスタート ▼</div>
    </div>
</div>

<script>
// ============================================================
// CANVAS & CORE SETUP
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H, scale;

function resize() {
    W = canvas.width = window.innerWidth * devicePixelRatio;
    H = canvas.height = window.innerHeight * devicePixelRatio;
    scale = devicePixelRatio;
    ctx.setTransform(scale, 0, 0, scale, 0, 0);
}
window.addEventListener('resize', resize);
resize();

const vw = () => window.innerWidth;
const vh = () => window.innerHeight;

// ============================================================
// SOUND
// ============================================================
let soundEnabled = true;
let audioCtx;
function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}
function playTone(freq, dur, type='sine', vol=0.08) {
    if (!soundEnabled) return;
    try {
        const a = getAudio();
        const o = a.createOscillator();
        const g = a.createGain();
        o.connect(g); g.connect(a.destination);
        o.frequency.value = freq; o.type = type;
        g.gain.setValueAtTime(vol, a.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
        o.start(a.currentTime); o.stop(a.currentTime + dur);
    } catch(e) {}
}
function sfxStep() { playTone(220, 0.04, 'triangle', 0.04); }
function sfxCollect() {
    playTone(523, 0.08); setTimeout(()=>playTone(659, 0.08), 80);
    setTimeout(()=>playTone(784, 0.12), 160);
}
function sfxFriend() {
    [523, 659, 784, 1047].forEach((n,i) => setTimeout(()=>playTone(n, 0.15), i*100));
}
function sfxVictory() {
    [523,587,659,698,784,880,988,1047].forEach((n,i) => setTimeout(()=>playTone(n, 0.15), i*120));
}
function toggleSound() {
    soundEnabled = !soundEnabled;
    document.getElementById('soundBtn').innerHTML = (soundEnabled ? '🔊' : '🔇') + ' <kbd>S</kbd>';
}

// ============================================================
// GAME STATE
// ============================================================
const GROUND_Y = 0.72;
const SCENE_COUNT = 2;
let currentScene = 0;
let gameStarted = false;
let dialogOpen = false;
let dialogCloseAction = null;

const moomin = {
    x: 200, y: 0,
    vx: 0, vy: 0,
    dir: 1,
    frame: 0,
    walkTimer: 0,
    size: 60,
    bobble: 0,
};

const friendsFound = new Set();
const itemsCollected = new Set();

const friends = [
    { id: 'snorkmaiden', scene: 0, x: 0.45, y: 0, emoji: '🎀', name: 'スノークのおじょうさん',
      msg: '「きょうはぼうけんびよりね！いっしょにあそびましょう！」' },
    { id: 'snufkin', scene: 0, x: 0.72, y: 0, emoji: '🎩', name: 'スナフキン',
      msg: '「いちばんのたびは、いいともだちとのたびさ。」' },
    { id: 'littlemy', scene: 0, x: 0.58, y: 0, emoji: '👧', name: 'ちびのミイ',
      msg: '「なにかおもしろいことないの？あたし、たいくつなのきらいよ！」' },
    { id: 'sniff', scene: 1, x: 0.25, y: 0, emoji: '🐾', name: 'スニフ',
      msg: '「たからもの、みつけた？ぼく、あつめるのだいすき！」' },
    { id: 'moominpappa', scene: 1, x: 0.55, y: 0, emoji: '🎩', name: 'ムーミンパパ',
      msg: '「ぼうけんは、いちばんのものがたりになるんだよ。」' },
    { id: 'moominmamma', scene: 1, x: 0.75, y: 0, emoji: '👜', name: 'ムーミンママ',
      msg: '「おかえりなさい。パンケーキ、たべる？」' },
];

const items = [
    { id: 'coffee', scene: 0, x: 0.18, y: -20, emoji: '☕', name: 'コーヒー' },
    { id: 'pancake', scene: 0, x: 0.22, y: -30, emoji: '🥞', name: 'パンケーキ' },
    { id: 'jam', scene: 0, x: 0.35, y: -10, emoji: '🍓', name: 'いちごジャム' },
    { id: 'book', scene: 0, x: 0.62, y: -15, emoji: '📚', name: 'ぼうけんのほん' },
    { id: 'seashell', scene: 1, x: 0.20, y: 25, emoji: '🐚', name: 'きれいなかいがら' },
    { id: 'fish', scene: 1, x: 0.40, y: 30, emoji: '🐟', name: 'おさかな' },
    { id: 'flowercrown', scene: 1, x: 0.50, y: -10, emoji: '💐', name: 'はなのかんむり' },
    { id: 'hat', scene: 1, x: 0.65, y: -20, emoji: '🎩', name: 'ふしぎなぼうし' },
];

const TOTAL = friends.length + items.length;

function getGroundY() { return vh() * GROUND_Y; }

// ============================================================
// MISSIONS UI
// ============================================================
let missionVisible = false;
function toggleMission() {
    missionVisible = !missionVisible;
    document.getElementById('missionPanel').classList.toggle('hidden', !missionVisible);
}

function updateMissionUI() {
    const list = document.getElementById('missionList');
    const missions = [
        { label: `なかまをみつけよう (${friendsFound.size}/6)`, done: friendsFound.size >= 6 },
        { label: `アイテムをあつめよう (${itemsCollected.size}/8)`, done: itemsCollected.size >= 8 },
        { label: 'すべてあつめてぼうけんかんりょう！', done: friendsFound.size >= 6 && itemsCollected.size >= 8 },
    ];
    list.innerHTML = missions.map(m =>
        `<div class="mission-item ${m.done?'done':''}">
            <div class="mission-check">${m.done?'✓':''}</div>
            <span>${m.label}</span>
        </div>`
    ).join('');

    const total = friendsFound.size + itemsCollected.size;
    const pct = Math.round(total / TOTAL * 100);
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressText').textContent = `${total} / ${TOTAL}`;
}

// ============================================================
// DRAWING – Background
// ============================================================
function drawSky(t) {
    const w = vw(), h = vh();
    const grad = ctx.createLinearGradient(0, 0, 0, h * 0.7);
    grad.addColorStop(0, '#87CEEB');
    grad.addColorStop(0.6, '#B8D8E8');
    grad.addColorStop(1, '#E8F4F8');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    // Sun
    const sunX = w - 100, sunY = 80;
    const sunR = 45 + Math.sin(t * 0.001) * 3;
    ctx.save();
    ctx.beginPath();
    ctx.arc(sunX, sunY, sunR + 20, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,215,0,0.15)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
    const sg = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunR);
    sg.addColorStop(0, '#FFE44D');
    sg.addColorStop(1, '#FFA500');
    ctx.fillStyle = sg;
    ctx.fill();
    ctx.restore();

    drawCloud(((t * 0.015) % (w + 300)) - 150, h * 0.10, 1.0);
    drawCloud(((t * 0.010 + 400) % (w + 300)) - 150, h * 0.18, 0.7);
    drawCloud(((t * 0.012 + 800) % (w + 300)) - 150, h * 0.08, 1.2);
}

function drawCloud(cx, cy, s) {
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath();
    ctx.ellipse(cx, cy, 50*s, 22*s, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx - 25*s, cy - 8*s, 30*s, 20*s, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + 25*s, cy - 5*s, 35*s, 22*s, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}

function drawMountains() {
    const w = vw(), gy = getGroundY();
    ctx.fillStyle = '#7A9AA8';
    drawMountain(w * 0.3, gy, 200, 180);
    ctx.fillStyle = '#6B8E99';
    drawMountain(w * 0.65, gy, 250, 220);
    ctx.fillStyle = '#8BAABC';
    drawMountain(w * 0.5, gy, 180, 150);
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    drawSnowCap(w * 0.3, gy, 200, 180, 0.25);
    drawSnowCap(w * 0.65, gy, 250, 220, 0.25);
}

function drawMountain(cx, baseY, halfW, height) {
    ctx.beginPath();
    ctx.moveTo(cx - halfW, baseY);
    ctx.quadraticCurveTo(cx - halfW * 0.3, baseY - height * 0.7, cx, baseY - height);
    ctx.quadraticCurveTo(cx + halfW * 0.3, baseY - height * 0.7, cx + halfW, baseY);
    ctx.closePath();
    ctx.fill();
}

function drawSnowCap(cx, baseY, halfW, height, pct) {
    const topY = baseY - height;
    const capH = height * pct;
    ctx.beginPath();
    ctx.moveTo(cx - halfW * pct * 1.2, topY + capH);
    ctx.quadraticCurveTo(cx - halfW * 0.1, topY + capH * 0.3, cx, topY);
    ctx.quadraticCurveTo(cx + halfW * 0.1, topY + capH * 0.3, cx + halfW * pct * 1.2, topY + capH);
    ctx.closePath();
    ctx.fill();
}

function drawGround(scene, t) {
    const w = vw(), h = vh(), gy = getGroundY();
    if (scene === 0) {
        const grd = ctx.createLinearGradient(0, gy, 0, h);
        grd.addColorStop(0, '#5DBE5D');
        grd.addColorStop(0.3, '#4CAF50');
        grd.addColorStop(1, '#3D8B3D');
        ctx.fillStyle = grd;
        ctx.fillRect(0, gy, w, h - gy);

        ctx.strokeStyle = '#3D8B3D';
        ctx.lineWidth = 2;
        for (let i = 0; i < 60; i++) {
            const gx = (i * 37 + 13) % w;
            const gy2 = gy + (i * 19 % 30);
            ctx.beginPath();
            ctx.moveTo(gx, gy2);
            ctx.quadraticCurveTo(gx + 3, gy2 - 12, gx + 1, gy2 - 18);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(gx + 5, gy2);
            ctx.quadraticCurveTo(gx + 8, gy2 - 10, gx + 10, gy2 - 16);
            ctx.stroke();
        }

        const flowers = ['#FF6B9D','#FFD700','#FF4500','#DA70D6','#FF69B4'];
        for (let i = 0; i < 25; i++) {
            const fx = (i * 53 + 20) % w;
            const fy = gy + 5 + (i * 31 % 50);
            const sway = Math.sin(t * 0.002 + i) * 3;
            drawFlower(fx + sway, fy, flowers[i % flowers.length], 6 + (i % 3) * 2);
        }

        drawMoominhouse(w * 0.12, gy);
        drawTree(w * 0.04, gy + 10, 0.9);
        drawTree(w * 0.85, gy - 5, 1.1);
        drawTree(w * 0.92, gy + 5, 0.8);
    } else {
        const grd = ctx.createLinearGradient(0, gy, 0, h);
        grd.addColorStop(0, '#5DBE5D');
        grd.addColorStop(0.4, '#C2B280');
        grd.addColorStop(0.6, '#DEB887');
        grd.addColorStop(1, '#C2A060');
        ctx.fillStyle = grd;
        ctx.fillRect(0, gy, w, h - gy);

        const waterY = gy + (h - gy) * 0.5;
        const wgrd = ctx.createLinearGradient(0, waterY, 0, h);
        wgrd.addColorStop(0, 'rgba(64,164,223,0.7)');
        wgrd.addColorStop(1, 'rgba(34,126,185,0.9)');
        ctx.fillStyle = wgrd;
        ctx.fillRect(0, waterY, w, h - waterY);

        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = 2;
        for (let i = 0; i < 5; i++) {
            const wy = waterY + 15 + i * 20;
            ctx.beginPath();
            for (let x = 0; x < w; x += 5) {
                const yy = wy + Math.sin(x * 0.02 + t * 0.003 + i) * 4;
                x === 0 ? ctx.moveTo(x, yy) : ctx.lineTo(x, yy);
            }
            ctx.stroke();
        }

        drawTree(w * 0.10, gy - 10, 1.0);
        drawTree(w * 0.35, gy - 15, 1.2);
        drawTree(w * 0.85, gy - 5, 0.9);

        const flowers = ['#FF6B9D','#FFD700','#DA70D6'];
        for (let i = 0; i < 12; i++) {
            const fx = (i * 71 + 40) % w;
            const fy = gy + 5 + (i * 23 % 30);
            drawFlower(fx, fy, flowers[i % flowers.length], 5);
        }
    }
}

function drawFlower(x, y, color, r) {
    ctx.save();
    ctx.strokeStyle = '#228B22';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x, y - r * 2.5);
    ctx.stroke();
    ctx.fillStyle = color;
    for (let i = 0; i < 5; i++) {
        const a = (Math.PI * 2 / 5) * i;
        ctx.beginPath();
        ctx.ellipse(x + Math.cos(a) * r * 0.7, y - r * 2.5 + Math.sin(a) * r * 0.7, r * 0.5, r * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(x, y - r * 2.5, r * 0.35, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

function drawTree(x, baseY, s) {
    ctx.save();
    const tw = 16 * s, th = 60 * s;
    const tg = ctx.createLinearGradient(x - tw/2, baseY, x + tw/2, baseY);
    tg.addColorStop(0, '#8B4513');
    tg.addColorStop(0.5, '#A0522D');
    tg.addColorStop(1, '#8B4513');
    ctx.fillStyle = tg;
    roundRect(x - tw/2, baseY - th, tw, th, 5);
    ctx.fill();
    const colors = ['#006400','#228B22','#2E8B57'];
    for (let i = 2; i >= 0; i--) {
        ctx.fillStyle = colors[i];
        ctx.beginPath();
        const fy = baseY - th - i * 22 * s;
        ctx.ellipse(x, fy, (50 - i * 8) * s, (38 - i * 6) * s, 0, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
}

function drawMoominhouse(x, groundY) {
    ctx.save();
    const bw = 120, bh = 130;
    const baseX = x, baseY = groundY;

    const bg = ctx.createLinearGradient(baseX, baseY - bh, baseX + bw, baseY);
    bg.addColorStop(0, '#5B9BD5');
    bg.addColorStop(1, '#3A7DC5');
    ctx.fillStyle = bg;
    roundRect(baseX, baseY - bh, bw, bh, 8);
    ctx.fill();
    ctx.strokeStyle = '#2C5F8D';
    ctx.lineWidth = 3;
    roundRect(baseX, baseY - bh, bw, bh, 8);
    ctx.stroke();

    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.moveTo(baseX - 15, baseY - bh);
    ctx.lineTo(baseX + bw / 2, baseY - bh - 60);
    ctx.lineTo(baseX + bw + 15, baseY - bh);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#654321';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = '#8B4513';
    ctx.fillRect(baseX + bw * 0.35, baseY - bh - 75, 20, 40);
    ctx.strokeStyle = '#654321';
    ctx.strokeRect(baseX + bw * 0.35, baseY - bh - 75, 20, 40);

    ctx.fillStyle = '#654321';
    roundRect(baseX + bw/2 - 16, baseY - 55, 32, 55, 8);
    ctx.fill();
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(baseX + bw/2 + 8, baseY - 28, 3, 0, Math.PI * 2);
    ctx.fill();

    const winColor = '#FFE4B5';
    [[baseX + 18, baseY - bh + 25], [baseX + bw - 44, baseY - bh + 25],
     [baseX + 18, baseY - bh + 68], [baseX + bw - 44, baseY - bh + 68]].forEach(([wx, wy]) => {
        ctx.fillStyle = winColor;
        ctx.fillRect(wx, wy, 26, 30);
        ctx.strokeStyle = '#654321';
        ctx.lineWidth = 2;
        ctx.strokeRect(wx, wy, 26, 30);
        ctx.beginPath();
        ctx.moveTo(wx + 13, wy);
        ctx.lineTo(wx + 13, wy + 30);
        ctx.moveTo(wx, wy + 15);
        ctx.lineTo(wx + 26, wy + 15);
        ctx.stroke();
    });
    ctx.restore();
}

// ============================================================
// DRAWING – Moomin Character
// ============================================================
function drawMoomin(t) {
    const gy = getGroundY();
    const mx = moomin.x;
    const my = gy + moomin.y - 5;
    const s = moomin.size / 60;
    const dir = moomin.dir;

    const isWalking = moomin.vx !== 0;
    const walkPhase = isWalking ? Math.sin(t * 0.008 * 5) : 0;
    const bobY = isWalking ? Math.abs(Math.sin(t * 0.008 * 5)) * 4 : 0;
    const bodyY = my - bobY;

    ctx.save();
    ctx.translate(mx, bodyY);
    ctx.scale(dir * s, s);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(0, 5 + bobY, 28, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    // Tail
    ctx.save();
    ctx.strokeStyle = '#333'; ctx.lineWidth = 3; ctx.fillStyle = '#FAFAFA';
    const tailWag = isWalking ? Math.sin(t * 0.01 * 3) * 8 : Math.sin(t * 0.002) * 3;
    ctx.beginPath();
    ctx.moveTo(-18, -35);
    ctx.quadraticCurveTo(-32 + tailWag, -55, -28 + tailWag, -68);
    ctx.quadraticCurveTo(-24 + tailWag, -72, -20 + tailWag, -68);
    ctx.quadraticCurveTo(-26 + tailWag, -50, -14, -35);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.restore();

    // Legs
    const legAngle1 = walkPhase * 15;
    const legAngle2 = -walkPhase * 15;
    ctx.save();
    ctx.fillStyle = '#FAFAFA'; ctx.strokeStyle = '#333'; ctx.lineWidth = 2.5;
    ctx.save(); ctx.translate(-10, -5); ctx.rotate(legAngle1 * Math.PI / 180);
    roundRect(-6, -3, 12, 22, 6); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#FAFAFA'; ctx.beginPath();
    ctx.ellipse(0, 20, 10, 5, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.restore();
    ctx.save(); ctx.translate(10, -5); ctx.rotate(legAngle2 * Math.PI / 180);
    ctx.fillStyle = '#FAFAFA';
    roundRect(-6, -3, 12, 22, 6); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(0, 20, 10, 5, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.restore();
    ctx.restore();

    // Body
    ctx.save(); ctx.fillStyle = '#FAFAFA'; ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.ellipse(0, -38, 24, 32, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke(); ctx.restore();

    // Arms
    ctx.save(); ctx.fillStyle = '#FAFAFA'; ctx.strokeStyle = '#333'; ctx.lineWidth = 2.5;
    const armSwing = isWalking ? Math.sin(t * 0.008 * 5) * 12 : Math.sin(t * 0.002) * 3;
    ctx.save(); ctx.translate(-22, -45); ctx.rotate((armSwing + 10) * Math.PI / 180);
    ctx.beginPath(); ctx.ellipse(0, 10, 6, 14, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.restore();
    ctx.save(); ctx.translate(22, -45); ctx.rotate((-armSwing - 10) * Math.PI / 180);
    ctx.beginPath(); ctx.ellipse(0, 10, 6, 14, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.restore();
    ctx.restore();

    // Head
    ctx.save(); ctx.fillStyle = '#FAFAFA'; ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.ellipse(0, -72, 20, 24, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke(); ctx.restore();

    // Ears
    ctx.save(); ctx.fillStyle = '#FAFAFA'; ctx.strokeStyle = '#333'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.ellipse(-14, -98, 7, 14, -0.2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(14, -98, 7, 14, 0.2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.restore();

    // Snout
    ctx.save(); ctx.fillStyle = '#FAFAFA'; ctx.strokeStyle = '#333'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.ellipse(0, -62, 14, 11, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.restore();

    // Nose
    ctx.save(); ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.ellipse(0, -57, 4, 3.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // Eyes
    ctx.save(); ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.ellipse(-9, -78, 3.5, 4.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(9, -78, 3.5, 4.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.ellipse(-8, -80, 1.5, 1.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(10, -80, 1.5, 1.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // Mouth
    ctx.save(); ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, -60, 6, 0.2, Math.PI - 0.2); ctx.stroke();
    ctx.restore();

    ctx.restore();
}

// DRAWING – NPCs & Items
// ============================================================
function drawNPC(f, t) {
    if (friendsFound.has(f.id)) return;
    const w = vw(), gy = getGroundY();
    const x = f.x * w;
    const y = gy + f.y;
    const bob = Math.sin(t * 0.003 + f.x * 10) * 5;

    ctx.save();
    ctx.font = '48px serif';
    ctx.textAlign = 'center';
    ctx.fillText(f.emoji, x, y - 10 + bob);

    ctx.font = 'bold 12px sans-serif';
    const tw = ctx.measureText(f.name).width;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    roundRect(x - tw/2 - 8, y + 4 + bob, tw + 16, 22, 10);
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.fillText(f.name, x, y + 20 + bob);

    const dist = Math.abs(moomin.x - x);
    if (dist < 80) {
        ctx.strokeStyle = 'rgba(255,215,0,0.6)';
        ctx.lineWidth = 3;
        ctx.setLineDash([6, 4]);
        ctx.beginPath();
        ctx.ellipse(x, y - 5, 35, 45, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
    }
    ctx.restore();
}

function drawItem(item, t) {
    if (itemsCollected.has(item.id)) return;
    const w = vw(), gy = getGroundY();
    const x = item.x * w;
    const y = gy + item.y;
    const bob = Math.sin(t * 0.004 + item.x * 8) * 8;

    ctx.save();
    ctx.fillStyle = 'rgba(255,255,100,0.15)';
    ctx.beginPath();
    ctx.arc(x, y - 10 + bob, 25, 0, Math.PI * 2);
    ctx.fill();

    ctx.font = '36px serif';
    ctx.textAlign = 'center';
    ctx.fillText(item.emoji, x, y + bob);

    const sparkle = Math.sin(t * 0.005 + item.x * 5) > 0.7;
    if (sparkle) {
        ctx.font = '14px serif';
        ctx.fillText('✨', x + 18, y - 20 + bob);
    }

    const dist = Math.abs(moomin.x - x);
    if (dist < 70) {
        ctx.strokeStyle = 'rgba(255,200,0,0.7)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 3]);
        ctx.beginPath();
        ctx.arc(x, y - 5 + bob, 28, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
    }
    ctx.restore();
}

function drawSceneArrows(t) {
    const w = vw(), gy = getGroundY();
    const pulse = 0.6 + Math.sin(t * 0.004) * 0.4;

    if (currentScene === 0) {
        ctx.save();
        ctx.globalAlpha = pulse;
        const ax = w - 30, ay = gy - 40;
        ctx.fillStyle = 'rgba(255,215,0,0.3)';
        ctx.beginPath(); ctx.arc(ax, ay, 28, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#FFF'; ctx.font = '28px serif';
        ctx.textAlign = 'center';
        ctx.fillText('➡️', ax, ay + 8);
        ctx.font = 'bold 11px sans-serif';
        ctx.fillStyle = '#FFD700';
        ctx.fillText('うみべへ', ax, ay + 32);
        ctx.restore();
    }
    if (currentScene === 1) {
        ctx.save();
        ctx.globalAlpha = pulse;
        const ax = 30, ay = gy - 40;
        ctx.fillStyle = 'rgba(255,215,0,0.3)';
        ctx.beginPath(); ctx.arc(ax, ay, 28, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#FFF'; ctx.font = '28px serif';
        ctx.textAlign = 'center';
        ctx.fillText('⬅️', ax, ay + 8);
        ctx.font = 'bold 11px sans-serif';
        ctx.fillStyle = '#FFD700';
        ctx.fillText('たにへ', ax, ay + 32);
        ctx.restore();
    }
}

// ============================================================
// INPUT — Keyboard-first
// ============================================================
const keys = {};

document.addEventListener('keydown', e => {
    // Prevent scrolling for game keys
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space',' ','Enter'].includes(e.key)) {
        e.preventDefault();
    }

    keys[e.key] = true;

    // Flash the corresponding key in controls bar
    flashKey(e.key);

    // --- Screen-specific handling ---

    // Tutorial screen
    if (!gameStarted && document.getElementById('tutorial').style.display !== 'none') {
        if (e.key === ' ' || e.key === 'Enter') {
            startGame();
        }
        return;
    }

    // Dialog open
    if (dialogOpen) {
        if (e.key === ' ' || e.key === 'Enter' || e.key === 'Escape') {
            if (dialogCloseAction) {
                dialogCloseAction();
            } else {
                closeDialog();
            }
        }
        return;
    }

    // In-game keys
    if (gameStarted && !dialogOpen) {
        if (e.key === ' ' || e.key === 'Enter') {
            doAction();
        } else if (e.key === 'm' || e.key === 'M') {
            toggleMission();
        } else if (e.key === 's' && !e.ctrlKey && !e.metaKey) {
            // Only toggle sound with bare 's', not Ctrl+S
            toggleSound();
        } else if (e.key === 'Escape') {
            goHome();
        }
    }
});

document.addEventListener('keyup', e => {
    keys[e.key] = false;
    unflashKey(e.key);
});

// Key flash feedback on controls bar
function flashKey(key) {
    let el = null;
    if (key === 'ArrowUp' || key === 'w' || key === 'W') el = document.getElementById('kUp');
    else if (key === 'ArrowDown' || key === 's') el = document.getElementById('kDown');
    else if (key === 'ArrowLeft' || key === 'a' || key === 'A') el = document.getElementById('kLeft');
    else if (key === 'ArrowRight' || key === 'd' || key === 'D') el = document.getElementById('kRight');
    else if (key === ' ' || key === 'Enter') el = document.getElementById('kSpace');
    if (el) el.classList.add('flash');
}

function unflashKey(key) {
    let el = null;
    if (key === 'ArrowUp' || key === 'w' || key === 'W') el = document.getElementById('kUp');
    else if (key === 'ArrowDown' || key === 's') el = document.getElementById('kDown');
    else if (key === 'ArrowLeft' || key === 'a' || key === 'A') el = document.getElementById('kLeft');
    else if (key === 'ArrowRight' || key === 'd' || key === 'D') el = document.getElementById('kRight');
    else if (key === ' ' || key === 'Enter') el = document.getElementById('kSpace');
    if (el) el.classList.remove('flash');
}

function goHome() {
    window.location.href = 'index.html';
}

// ============================================================
// GAME LOGIC
// ============================================================
const SPEED = 3.5;

function updateMoomin() {
    if (dialogOpen) return;

    let dx = 0, dy = 0;
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx = -1;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) dx = 1;
    if (keys['ArrowUp'] || keys['w'] || keys['W']) dy = -1;
    if (keys['ArrowDown'] || keys['s'] || keys['S']) dy = 1;

    if (dx !== 0 || dy !== 0) {
        const len = Math.sqrt(dx*dx + dy*dy);
        moomin.vx = (dx / len) * SPEED;
        moomin.vy = (dy / len) * SPEED;
        if (dx !== 0) moomin.dir = dx > 0 ? 1 : -1;
        sfxStep();
    } else {
        moomin.vx *= 0.8;
        moomin.vy *= 0.8;
        if (Math.abs(moomin.vx) < 0.1) moomin.vx = 0;
        if (Math.abs(moomin.vy) < 0.1) moomin.vy = 0;
    }

    moomin.x += moomin.vx;
    moomin.y += moomin.vy;

    const w = vw();
    const maxY = (vh() - getGroundY()) * 0.6;
    moomin.y = Math.max(-maxY + 10, Math.min(moomin.y, maxY - 10));

    // Scene transitions
    if (moomin.x > w - 15 && currentScene === 0) {
        currentScene = 1;
        moomin.x = 40;
        updateSceneDots();
        sfxCollect();
    } else if (moomin.x < 15 && currentScene === 1) {
        currentScene = 0;
        moomin.x = w - 40;
        updateSceneDots();
        sfxCollect();
    }

    moomin.x = Math.max(25, Math.min(moomin.x, w - 25));
}

function updateSceneDots() {
    document.getElementById('dot0').classList.toggle('active', currentScene === 0);
    document.getElementById('dot1').classList.toggle('active', currentScene === 1);
    document.getElementById('areaLabel').textContent = currentScene === 0 ? 'ムーミン谷' : 'うみべ';
}

// Proximity & action
let nearbyTarget = null;

function checkProximity() {
    nearbyTarget = null;
    const w = vw();
    const RANGE = 70;

    for (const f of friends) {
        if (f.scene !== currentScene || friendsFound.has(f.id)) continue;
        const fx = f.x * w;
        const dist = Math.abs(moomin.x - fx);
        if (dist < RANGE) {
            nearbyTarget = { type: 'friend', data: f };
            break;
        }
    }

    if (!nearbyTarget) {
        for (const item of items) {
            if (item.scene !== currentScene || itemsCollected.has(item.id)) continue;
            const ix = item.x * w;
            const dist = Math.abs(moomin.x - ix);
            if (dist < RANGE) {
                nearbyTarget = { type: 'item', data: item };
                break;
            }
        }
    }

    // Update bottom bar info
    const spaceLabel = document.getElementById('spaceLabel');
    const ctrlInfo = document.getElementById('ctrlInfo');
    const kSpace = document.getElementById('kSpace');

    if (nearbyTarget) {
        if (nearbyTarget.type === 'friend') {
            spaceLabel.textContent = 'はなす';
            ctrlInfo.innerHTML = `<span class="action-hint-text">💬 ${nearbyTarget.data.name}</span>`;
        } else {
            spaceLabel.textContent = 'ひろう';
            ctrlInfo.innerHTML = `<span class="action-hint-text">✋ ${nearbyTarget.data.name}</span>`;
        }
        kSpace.classList.add('active');
    } else {
        spaceLabel.textContent = 'しらべる';
        ctrlInfo.innerHTML = '<span>🔍 ちかくにさがそう</span>';
        kSpace.classList.remove('active');
    }
}

function doAction() {
    if (!nearbyTarget || dialogOpen) return;

    if (nearbyTarget.type === 'friend') {
        const f = nearbyTarget.data;
        friendsFound.add(f.id);
        sfxFriend();
        showDialog(f.emoji, `${f.name}にあえた！`, f.msg);
        createParticles(moomin.x, getGroundY() - 50);
    } else {
        const item = nearbyTarget.data;
        itemsCollected.add(item.id);
        sfxCollect();
        showDialog(item.emoji, `${item.name}をゲット！`, 'アイテムをてにいれたよ！');
        createParticles(moomin.x, getGroundY() - 30);
    }

    updateMissionUI();
    nearbyTarget = null;

    // Check victory
    if (friendsFound.size >= 6 && itemsCollected.size >= 8) {
        setTimeout(() => {
            sfxVictory();
            showDialog('🎉', 'ぼうけんかんりょう！',
                'すべてのなかまにあえて、アイテムもぜんぶあつめたよ！\nムーミン谷はよろこびでいっぱい！ 💕',
                'もういちど あそぶ', () => location.reload(),
                'Space でもういちど');
        }, 1200);
    }
}

// ============================================================
// DIALOG — keyboard-dismissable
// ============================================================
function showDialog(emoji, title, text, btnText, btnAction, keyHint) {
    document.getElementById('dialogEmoji').textContent = emoji;
    document.getElementById('dialogTitle').textContent = title;
    document.getElementById('dialogText').textContent = text;
    const btn = document.getElementById('dialogBtn');
    btn.textContent = btnText || 'つぎへ';
    dialogCloseAction = btnAction || null;
    btn.onclick = btnAction || closeDialog;
    document.getElementById('dialogKeyHint').textContent = keyHint || 'Space / Enter でとじる';
    document.getElementById('dialogOverlay').classList.add('show');
    dialogOpen = true;
}

function closeDialog() {
    document.getElementById('dialogOverlay').classList.remove('show');
    dialogOpen = false;
    dialogCloseAction = null;
}

// ============================================================
// PARTICLES
// ============================================================
const particles = [];

function createParticles(x, y) {
    const emojis = ['✨','⭐','💫','🌟','❤️'];
    for (let i = 0; i < 12; i++) {
        const angle = (Math.PI * 2 / 12) * i;
        const speed = 1.5 + Math.random() * 2;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 2,
            life: 1,
            emoji: emojis[Math.floor(Math.random() * emojis.length)],
            size: 14 + Math.random() * 10,
        });
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.05;
        p.life -= 0.02;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function drawParticles() {
    for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.font = `${p.size}px serif`;
        ctx.textAlign = 'center';
        ctx.fillText(p.emoji, p.x, p.y);
        ctx.restore();
    }
}

// ============================================================
// UTILITY
// ============================================================
function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

// ============================================================
// MAIN LOOP
// ============================================================
function gameLoop(timestamp) {
    if (!gameStarted) { requestAnimationFrame(gameLoop); return; }

    const w = vw(), h = vh();
    ctx.clearRect(0, 0, w, h);

    drawSky(timestamp);
    drawMountains();
    drawGround(currentScene, timestamp);

    items.filter(i => i.scene === currentScene).forEach(i => drawItem(i, timestamp));
    friends.filter(f => f.scene === currentScene).forEach(f => drawNPC(f, timestamp));

    updateMoomin();
    drawMoomin(timestamp);
    drawSceneArrows(timestamp);

    updateParticles();
    drawParticles();

    checkProximity();

    requestAnimationFrame(gameLoop);
}

// ============================================================
// START
// ============================================================
function startGame() {
    const tut = document.getElementById('tutorial');
    tut.classList.add('fade-out');
    setTimeout(() => tut.style.display = 'none', 500);
    gameStarted = true;
    moomin.x = vw() * 0.3;
    moomin.y = 0;
    updateMissionUI();
    try { getAudio().resume(); } catch(e) {}
}

// Touch support for title/tutorial
document.getElementById('tutorial').addEventListener('click', e => {
    if (e.target.closest('.dialog-btn')) return; // let button handle it
    startGame();
});

// Touch support for dialog
document.getElementById('dialogOverlay').addEventListener('click', e => {
    if (dialogOpen) {
        if (dialogCloseAction) {
            dialogCloseAction();
        } else {
            closeDialog();
        }
    }
});

updateMissionUI();
requestAnimationFrame(gameLoop);
</script>
