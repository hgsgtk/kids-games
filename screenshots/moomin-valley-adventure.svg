<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#98D8C8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90EE90;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#skyGradient)"/>
  
  <!-- Sun -->
  <circle cx="650" cy="100" r="50" fill="#FFD700" opacity="0.9"/>
  
  <!-- Clouds -->
  <ellipse cx="150" cy="100" rx="60" ry="30" fill="white" opacity="0.8"/>
  <ellipse cx="180" cy="90" rx="40" ry="25" fill="white" opacity="0.8"/>
  <ellipse cx="500" cy="150" rx="70" ry="35" fill="white" opacity="0.8"/>
  <ellipse cx="540" cy="140" rx="50" ry="30" fill="white" opacity="0.8"/>
  
  <!-- Ground -->
  <rect y="400" width="800" height="200" fill="#90EE90" opacity="0.5"/>
  
  <!-- Trees -->
  <rect x="80" y="360" width="30" height="60" fill="#8B4513"/>
  <circle cx="95" cy="350" r="50" fill="#228B22"/>
  <circle cx="75" cy="330" r="35" fill="#228B22"/>
  <circle cx="115" cy="330" r="35" fill="#228B22"/>
  
  <rect x="650" y="370" width="35" height="70" fill="#8B4513"/>
  <circle cx="667" cy="355" r="60" fill="#228B22"/>
  <circle cx="645" cy="335" r="40" fill="#228B22"/>
  <circle cx="690" cy="335" r="40" fill="#228B22"/>
  
  <!-- Flowers -->
  <circle cx="200" cy="430" r="15" fill="#FFB6C1"/>
  <circle cx="190" cy="425" r="8" fill="#FF69B4"/>
  <circle cx="210" cy="425" r="8" fill="#FF69B4"/>
  <circle cx="200" cy="418" r="8" fill="#FF69B4"/>
  <circle cx="200" cy="442" r="8" fill="#FF69B4"/>
  <rect x="198" y="442" width="4" height="30" fill="#228B22"/>
  
  <circle cx="450" cy="435" r="18" fill="#FFD700"/>
  <circle cx="440" cy="425" r="10" fill="#FFA500"/>
  <circle cx="460" cy="425" r="10" fill="#FFA500"/>
  <circle cx="450" cy="415" r="10" fill="#FFA500"/>
  <circle cx="450" cy="445" r="10" fill="#FFA500"/>
  <rect x="448" y="445" width="4" height="35" fill="#228B22"/>
  
  <!-- Moomin character (simplified white hippopotamus-like) -->
  <g transform="translate(400, 320)">
    <!-- Body -->
    <ellipse cx="0" cy="20" rx="40" ry="50" fill="white" stroke="#333" stroke-width="3"/>
    <!-- Snout -->
    <ellipse cx="0" cy="0" rx="25" ry="20" fill="white" stroke="#333" stroke-width="3"/>
    <!-- Eyes -->
    <circle cx="-12" cy="-5" r="4" fill="#333"/>
    <circle cx="12" cy="-5" r="4" fill="#333"/>
    <!-- Nose -->
    <circle cx="0" cy="5" r="5" fill="#333"/>
    <!-- Tail -->
    <ellipse cx="35" cy="25" rx="12" ry="20" fill="white" stroke="#333" stroke-width="3" transform="rotate(-20 435 345)"/>
  </g>
  
  <!-- Treasures as stars -->
  <g transform="translate(150, 280)">
    <polygon points="0,-20 5,-6 20,-6 8,3 12,18 0,9 -12,18 -8,3 -20,-6 -5,-6" fill="#FFD700" stroke="#FFA500" stroke-width="2"/>
  </g>
  
  <g transform="translate(580, 250)">
    <polygon points="0,-12 3,-3 12,-3 5,2 8,11 0,5 -8,11 -5,2 -12,-3 -3,-3" fill="#FF1493" stroke="#C71585" stroke-width="2"/>
    <polygon points="0,-8 2,-2 8,-2 3,1 5,7 0,3 -5,7 -3,1 -8,-2 -2,-2" fill="#FFC0CB"/>
  </g>
  
  <g transform="translate(300, 200)">
    <rect x="-15" y="-15" width="30" height="30" fill="#FF6B9D" stroke="#C06C84" stroke-width="2" rx="3"/>
    <rect x="-15" y="-15" width="30" height="10" fill="#FF1493" stroke="#C06C84" stroke-width="2"/>
    <rect x="-5" y="-15" width="10" height="30" fill="#FF1493" stroke="#C06C84" stroke-width="2"/>
  </g>
</svg>
